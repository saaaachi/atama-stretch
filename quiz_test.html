<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 overflow:hidden;
}

.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
 box-sizing:border-box;
}

.back{font-size:20px;}
.title{font-weight:bold;font-size:18px;}

.ad{
 margin-top:60px;
 text-align:center;
 min-height:110px;
}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:10px 15px;
}

.audio{
 display:flex;
 align-items:center;
 gap:8px;
 font-size:13px;
}

.audio button{
 border:none;
 padding:6px 10px;
 border-radius:10px;
 background:#dfe6e9;
}

.audio input[type="range"]{
 width:70px;
}

.container{
 text-align:center;
 padding:10px;
}

.question{
 font-size:34px;
 margin:20px 0;
}

.btn{
 width:90%;
 margin:10px auto;
 padding:20px;
 font-size:24px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
}

.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

.memory{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.card{
 height:75px;
 background:#b2bec3;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
}

.matched{
 background:#b9fbc0!important;
}

.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border:none;
 border-radius:22px;
 background:#74b9ff;
 color:white;
 margin-top:30px;
}

.number-grid{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:10px;
 padding:10px;
}

.number-btn{
 padding:20px 0;
 font-size:24px;
 border:none;
 border-radius:15px;
 background:#81ecec;
}

/* ヒントボタン */
.hint-btn{
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:10px;
 background:#ffeaa7;
}

 .history-item{
 display:inline-block;
 background:#dfe6e9;
 padding:6px 10px;
 margin:3px;
 border-radius:8px;
 font-size:18px;
}

</style>
</head>

<body>

<div class="header">
 <div class="back" onclick="location.href='index.html'">←</div>
 <div class="title">問題</div>
</div>

<div class="ad" id="adArea"></div>

<div class="topbar">
 <div id="progress"></div>

 <div class="audio">
   <button onclick="toggleBGM()">BGM</button>

   <label>
     γ <input type="checkbox" id="gammaToggle">
   </label>

   <input type="range" id="gammaVol" min="0" max="1" step="0.1" value="0.5">
 </div>
</div>

<div class="container" id="container">
 <div id="last" style="color:red;font-weight:bold;"></div>
 <div id="question" class="question"></div>
 <div id="history" style="font-size:20px; margin-bottom:10px;"></div>
 <div id="answers"></div>
</div>

<script>
/* ---------------- 音 ---------------- */
let bgm=new Audio("music/bgm.mp3");
bgm.loop=true;

let gamma=new Audio("music/gamma.mp3");
gamma.loop=true;

let correctSound=new Audio("music/correct.mp3");
let wrongSound=new Audio("music/wrong.mp3");

let playing=false;

function toggleBGM(){
 if(playing){ bgm.pause(); }
 else{ bgm.play(); }
 playing=!playing;
}

gammaVol.oninput=function(){
 gamma.volume=parseFloat(this.value);
};

gammaToggle.onchange=function(){
 if(this.checked){
   gamma.volume=parseFloat(gammaVol.value);
   gamma.play();
 }else{
   gamma.pause();
 }
};

/* ---------------- 設定 ---------------- */
let total=Number(localStorage.getItem("questionCount")) || 5;

let calcLevel=localStorage.getItem("calcLevel") || "easy";
let josiLevel=localStorage.getItem("josiLevel") || "easy";
let whichLevel=localStorage.getItem("whichLevel") || "easy";
let memoryPairs=localStorage.getItem("memoryPairs") || "3";
let numberLevel = localStorage.getItem("numberLevel") || "easy";


let useCalc = calcLevel!=="none";
let useJosi = josiLevel!=="none";
let useWhich = whichLevel!=="none";
let useMemory = memoryPairs!=="none";
let useNumber = numberLevel!=="none";
let oddLevel = localStorage.getItem("oddLevel") || "easy";
let useOdd = oddLevel!=="none";

/* ---------------- 共通 ---------------- */
function shuffle(arr){
 return [...arr].sort(()=>Math.random()-0.5);
}

/* ---------------- 助詞問題 ---------------- */
const josiEasy=[
["家","に","帰る"],["学校","へ","行く"],["公園","で","遊ぶ"],["友達","と","話す"],["本","を","読む"],
["部屋","で","寝る"],["駅","へ","行く"],["犬","と","遊ぶ"],["テレビ","を","見る"],["海","で","泳ぐ"]
];

const josiNormal=[
["先生","に","聞く"],["家族","と","食べる"],["車","で","行く"],["音楽","を","聞く"],["手紙","を","書く"],
["会社","へ","向かう"],["友達","に","会う"],["道","を","歩く"],["店","で","買う"],["電車","で","帰る"]
];

const josiHard=[
["友達","に","手紙を書く"],["犬","と","公園へ行く"],["学校","で","先生に聞く"],["家族","と","店で食べる"],["駅","へ","電車で向かう"],
["部屋","で","本を読む"],["先生","に","相談する"],["海","で","友達と遊ぶ"],["会社","へ","車で向かう"],["公園","で","犬と走る"]
];

function getJosiList(){
 if(josiLevel==="easy") return shuffle(josiEasy);
 if(josiLevel==="normal") return shuffle(josiNormal);
 if(josiLevel==="hard") return shuffle(josiHard);
 return [];
}

/* ---------------- どっち問題 ---------------- */
const whichEasy=[
["🐶","🐱","いぬ"],["🍎","🍌","りんご"],["🚗","🚲","くるま"],["🐟","🐔","さかな"],["🌞","🌙","たいよう"],
["🍓","🍇","いちご"],["📱","💻","スマホ"],["🍞","🍙","パン"],["👟","👠","くつ"],["🐸","🐍","かえる"]
];

const whichNormal=[
["🐧","🦆","ペンギン"],["🎹","🎻","ピアノ"],["🍔","🍕","ハンバーガー"],["🐼","🐨","パンダ"],["🚑","🚓","きゅうきゅうしゃ"],
["📚","📰","ほん"],["🍰","🍩","ケーキ"],["🌸","🌻","さくら"],["✈️","🚢","ひこうき"],["🎸","🥁","ギター"]
];

const whichHard=[
["🍎","🍌","赤い果物"],["🌞","🌙","夜に出るの"],["🐟","🐔","海で泳ぐの"],["🚗","✈️","空を飛ぶの"],["🎹","🎸","白と黒の鍵盤があるの"],
["📱","💻","電話できるの"],["🍓","🍇","つぶつぶの果物"],["🐼","🐨","白と黒の動物"],["🚑","🚓","病院へ急ぐ車"],["🌸","🌻","春に咲く花"]
];

function getWhichList(){
 if(whichLevel==="easy") return shuffle(whichEasy);
 if(whichLevel==="normal") return shuffle(whichNormal);
 if(whichLevel==="hard") return shuffle(whichHard);
 return [];
}

/* ---------------- 神経衰弱 ---------------- */
const memorySets=["🍎","🍊","🍌","🐶","🐱","🐼","🚗","🚲","✈️","🍓","🍇","🍒"];

/* ---------------- 計算 ---------------- */
function generateCalc(){
 let a,b,ans,op;

 if(calcLevel==="easy"){
   if(Math.random()<0.5){ a=Math.floor(Math.random()*10); b=Math.floor(Math.random()*10); ans=a+b; op="+";}
   else{ a=Math.floor(Math.random()*20); b=Math.floor(Math.random()*(a+1)); ans=a-b; op="-";}
 }

 if(calcLevel==="normal"){
   if(Math.random()<0.5){ a=Math.floor(Math.random()*90)+10; b=Math.floor(Math.random()*90)+10; ans=a+b; op="+";}
   else{
     a=Math.floor(Math.random()*90)+10;
     b=Math.floor(Math.random()*90)+10;
     if(b>a){ let t=a; a=b; b=t; }
     ans=a-b; op="-";
   }
 }

 if(calcLevel==="hard"){
   if(Math.random()<0.5){ a=Math.floor(Math.random()*8)+2; b=Math.floor(Math.random()*8)+2; ans=a*b; op="×";}
   else{ b=Math.floor(Math.random()*8)+2; ans=Math.floor(Math.random()*8)+2; a=b*ans; op="÷";}
 }

 let wrong=ans+(Math.random()<0.5?1:-1);
 if(wrong===ans) wrong+=2;
 if(wrong<0) wrong=ans+2;

 return{ q:`${a} ${op} ${b} = ?`, choices:[ans,wrong], answer:ans };
}

/* ---------------- 数字 */
 function startNumber(){

 answers.innerHTML="";
 answers.className="number-grid";

 let nums=[];
 let correctOrder=[];
 let isAscending=true;
 let historyEl = document.getElementById("history");
historyEl.innerText = "";


 /* ---------------- 難易度 ---------------- */
 if(numberLevel==="easy"){

   // 1〜6 小さい順（3×2）
   nums = shuffle([1,2,3,4,5,6]);
   correctOrder = [1,2,3,4,5,6];
   isAscending = true;

   answers.style.gridTemplateColumns="repeat(3,1fr)";
 }

 else if(numberLevel==="normal"){

   // 10〜20から10個 小さい順（5×2）
   let base = shuffle([...Array(10)].map((_,i)=>i+11));
   nums = shuffle(base);
   correctOrder = [...base].sort((a,b)=>a-b);
   isAscending = true;

   answers.style.gridTemplateColumns="repeat(5,1fr)";
 }

 else{

   // 1〜30から10個 大きい順（5×2）
   let base = shuffle([...Array(30)].map((_,i)=>i+1)).slice(0,10);
   nums = shuffle(base);
   correctOrder = [...base].sort((a,b)=>b-a);
   isAscending = false;

   answers.style.gridTemplateColumns="repeat(5,1fr)";
 }

 /* ---------------- 表示 ---------------- */
 question.innerText = isAscending
   ? "小さい順に押そう"
   : "大きい順に押そう";

 let index = 0;
 let selected = []; // 押した履歴

 nums.forEach(n=>{

   let btn=document.createElement("button");
   btn.className="number-btn";
   btn.innerText=n;

   btn.onclick=()=>{

     if(n===correctOrder[index]){

       btn.style.background="#55efc4";
       selected.push(btn);
       index++;
　　　　 let span = document.createElement("span");
span.className = "history-item";
span.innerText = n;

historyEl.appendChild(span);

     if(index===correctOrder.length){
         score++;
         setTimeout(next,700);
       }

     }else{

       btn.style.background="#fab1a0";

       setTimeout(()=>{
         btn.style.background="#81ecec";
       },300);
     }

   };

   answers.appendChild(btn);

 });
}
/* ---------------- 仲間外れ ---------------- */

function startOdd(){

 answers.className="";

 const easy=[

   ["🍎","🍓","🍅","やさい"],

   ["🐶","🐱","🐟","さかな"],

   ["🚗","🚲","✈️","そら"],

   ["🍞","🍙","🍰","あまいもの"],

   ["🌸","🌻","🌲","き"]

 ];

 const normal=[

   ["🍎","🍓","🍌","くだもの"],

   ["🐶","🐱","🐧","りく"],

   ["🚗","🚲","🚢","みず"],

   ["🍞","🍙","🍰","しょくじ"],

   ["🌸","🌻","🌙","そら"]

 ];

 const hard=[

   ["🍎","🍓","🍅","やさい"],

   ["🐶","🐱","🐟","さかな"],

   ["🚗","🚲","✈️","そら"],

   ["🐼","🐨","🐧","みず"],

   ["🍞","🍙","🍰","あまい"]

 ];

 let list =

   oddLevel==="easy" ? easy :

   oddLevel==="normal" ? normal : hard;

 let d = shuffle(list)[0];

 question.innerText="仲間外れはどれ？";

 let correct = d[2];

 shuffle(d.slice(0,3)).forEach(c=>{

   let btn=document.createElement("button");

   btn.className="btn";

   btn.innerText=c;

   btn.onclick=()=>{

  if(c===correct){
    btn.classList.add("correct");
    score++;
    correctSound.currentTime=0;
    correctSound.play();
  }else{
    btn.classList.add("wrong");
    wrongSound.currentTime=0;
    wrongSound.play();
  }

  setTimeout(next,700);

   };

   answers.appendChild(btn);

 });

 /* ヒントボタン */

 let hintBtn=document.createElement("button");

 hintBtn.className="hint-btn";

 hintBtn.innerText="ヒント";

 hintBtn.onclick=()=>{

   hintBtn.innerText="ヒント："+d[3];

 };

 container.appendChild(hintBtn);
}

/* ---------------- 初期 ---------------- */
let current=0;
let score=0;

let josiQueue=getJosiList();
let whichQueue=getWhichList();

/* ---------------- 出題 ---------------- */
function next(){

 answers.innerHTML="";
 answers.className="";
 container.querySelectorAll(".hint-btn").forEach(e=>e.remove());

 let historyEl = document.getElementById("history");
if(historyEl) historyEl.innerText = "";
 
 if(current>=total){
   container.innerHTML=`
   <h2>🎉 おつかれさま！</h2>
   <p>${score}/${total} 正解！</p>
   <button class="big-home-btn" onclick="location.href='index.html'">ホームへ</button>`;
   return;
 }

 current++;

 progress.innerText=current+" / "+total;
 last.innerText=(current===total)?"ラスト問題！":"";

 if(current%2===1){
   adArea.innerHTML=`<ins class="adsbygoogle"
    style="display:inline-block;width:320px;height:100px"
    data-ad-client="ca-pub-1299640300068792"
    data-ad-slot="7107118417"></ins>`;
   try{ (adsbygoogle=window.adsbygoogle||[]).push({}); }catch(e){}
 }

 if(current===total && useMemory){
   startMemory();
   return;
 }

 let types=[];

if(useNumber) types.push("number");
if(useOdd) types.push("odd");
 if(useCalc) types.push("calc");
 if(useJosi) types.push("josi");
 if(useWhich) types.push("which");

 let type=types[(current-1)%types.length];

 if(type==="number"){
 startNumber();
 return;
}

if(type==="odd"){
 startOdd();
 return;
}

 if(type==="calc"){
   let d=generateCalc();
   renderChoice(d.q,d.choices,d.answer);
 }

 if(type==="josi"){
   if(josiQueue.length===0) josiQueue=getJosiList();
   let x=josiQueue.pop();
   let wrong=["に","で","と","を","へ"].filter(v=>v!==x[1])[0];

   renderChoice(`${x[0]}【${x[1]}・${wrong}】${x[2]}`,[x[1],wrong],x[1]);
 }

 if(type==="which"){
   if(whichQueue.length===0) whichQueue=getWhichList();
   let x=whichQueue.pop();
   renderChoice(`${x[2]}はどっち？`,[x[0],x[1]],x[0]);
 }
}

/* ---------------- 選択肢 ---------------- */
function renderChoice(q,choices,answer){
 question.innerText=q;

 shuffle(choices).forEach(c=>{
   let btn=document.createElement("button");
   btn.className="btn";
   btn.innerText=c;

   btn.onclick=()=>{
     if(c===answer){
       btn.classList.add("correct");
       correctSound.currentTime=0;
       correctSound.play();
       score++;
     }else{
       btn.classList.add("wrong");
       wrongSound.currentTime=0;
       wrongSound.play();
     }
     setTimeout(next,700);
   };

   answers.appendChild(btn);
 });
}

/* ---------------- 神経衰弱 ---------------- */
function startMemory(){

 question.innerText="神経衰弱";

 let pair=Number(memoryPairs);
 let base=shuffle(memorySets).slice(0,pair);
 let cards=shuffle([...base,...base]);

 let open=[];
 let matched=0;
 let lock=false;

 answers.className="memory";

 cards.forEach(card=>{
   let div=document.createElement("div");
   div.className="card";
   div.innerText="?";

   div.onclick=()=>{
     if(lock || div.innerText!=="?") return;

     div.innerText=card;
     open.push({div,card});

     if(open.length===2){
       lock=true;
       let a=open[0], b=open[1];

       if(a.card===b.card){
         a.div.classList.add("matched");
         b.div.classList.add("matched");
         matched+=2;
         open=[]; lock=false;

         if(matched===pair*2){
           score++;
           setTimeout(next,700);
         }

       }else{
         setTimeout(()=>{
           a.div.innerText="?";
           b.div.innerText="?";
           open=[]; lock=false;
         },700);
       }
     }
   };

   answers.appendChild(div);
 });
}

next();
</script>

</body>
</html>
