<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 overflow:auto; /* ← 修正ポイント */
}

.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
 box-sizing:border-box;
 z-index:10;
}

.back{font-size:20px;}
.title{font-weight:bold;font-size:18px;}

.ad{
 margin-top:50px; /* ← 少し上に */
 text-align:center;
 min-height:110px;
}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:10px 15px;
 margin-top:5px;
}

.container{
 text-align:center;
 padding:10px;
 margin-top:10px; /* ← 上に寄せる */
}

.question{
 font-size:34px;
 margin:30px 0 20px; /* ← 少し上に */
}

.btn{
 width:90%;
 margin:10px auto;
 padding:20px;
 font-size:24px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
 transition:.2s;
}

.btn:active{transform:scale(.95);}
.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border:none;
 border-radius:22px;
 background:#74b9ff;
 color:white;
 margin-top:30px;
}
</style>
</head>

<body>

<div class="header">
 <div class="back" onclick="location.href='index.html'">←</div>
 <div class="title">問題</div>
</div>

<div class="ad" id="adArea">
 <!-- 広告 -->
 <ins class="adsbygoogle"
 style="display:inline-block;width:320px;height:100px"
 data-ad-client="ca-pub-1299640300068792"
 data-ad-slot="7107118417"></ins>
 <script>
 (adsbygoogle = window.adsbygoogle || []).push({});
 </script>
</div>

<div class="topbar">
 <div id="progress"></div>
</div>

<div class="container" id="container">
 <div id="question" class="question">問題を準備しています…</div>
</div>

<script>

let total=5;
let current=0;

function next(){

 if(current >= total){
  container.innerHTML=
  `<h2>🎉 おつかれさま！</h2>
   <button class="big-home-btn" onclick="location.href='index.html'">ホームへ</button>`;
  return;
 }

 current++;

 progress.innerText=current+" / "+total;

 // ダミー問題（テスト用）
 question.innerText = "テスト問題 " + current;
}

setTimeout(next,1000);

</script>

</body>
</html>
