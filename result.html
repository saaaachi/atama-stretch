<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実績</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 text-align:center;
}

.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
 box-sizing:border-box;
}

.back{font-size:20px;}
.title{font-weight:bold;}

.container{
 margin-top:90px;
 padding:20px;
}

.card{
 background:#fff;
 padding:20px;
 margin:15px 0;
 border-radius:15px;
 box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.big{
 font-size:28px;
 font-weight:bold;
}

.badge{
 display:inline-block;
 padding:10px 15px;
 margin:5px;
 border-radius:20px;
 background:#dfe6e9;
}

.unlocked{
 background:#ffeaa7;
}

.home{
 margin-top:30px;
 padding:20px;
 width:90%;
 font-size:22px;
 border:none;
 border-radius:15px;
 background:#74b9ff;
 color:#fff;
}

/* カレンダー */
#calendar{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:5px;
 margin-top:10px;
}

.day{
 padding:10px 0;
 border-radius:8px;
 font-size:12px;
 background:#dfe6e9;
}

.played{
 background:#55efc4;
}

/* 今日（強調） */
.today{
 border:3px solid #0984e3;
 font-weight:bold;
 background:#dfe6e9;
}

/* あと1日表示 */
.next-goal{
 margin-top:10px;
 color:#e17055;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
 <div class="back" onclick="location.href='index.html'">←</div>
 <div class="title">実績</div>
</div>

<div class="container">

<div class="card">
 <div>プレイ回数</div>
 <div id="play" class="big"></div>
</div>

<div class="card">
 <div>正解率</div>
 <div id="rate" class="big"></div>
 <div id="compare" style="margin-top:10px;color:#636e72;"></div>
</div>

<div class="card">
 <div>連続プレイ日数🔥</div>
 <div id="streak" class="big"></div>
 <div id="nextGoal" class="next-goal"></div>
</div>

<div class="card">
 <div>🏆 実績</div>
 <div id="badges"></div>
</div>

<div class="card">
 <div>📅 プレイ履歴</div>
 <div id="calendar"></div>
</div>

<button class="home" onclick="location.href='index.html'">
🏠 ホームへ
</button>

</div>

<script>
let totalPlay = Number(localStorage.getItem("totalPlay")||0);
let totalCorrect = Number(localStorage.getItem("totalCorrect")||0);
let totalQuestions = Number(localStorage.getItem("totalQuestions")||0);
let streak = Number(localStorage.getItem("streak")||0);

document.getElementById("play").innerText = totalPlay+"回";

let rate = totalQuestions ? Math.floor((totalCorrect/totalQuestions)*100) : 0;
document.getElementById("rate").innerText = rate+"%";

document.getElementById("streak").innerText = streak+"日";

/* ===== 前回比較 ===== */
let lastRate = Number(localStorage.getItem("lastRate")||0);

if(lastRate){
 let diff = rate - lastRate;

 if(diff > 0){
   compare.innerText = "前回より +" + diff + "% 👍";
 }else if(diff < 0){
   compare.innerText = "前回より " + diff + "%";
 }else{
   compare.innerText = "前回と同じ！";
 }
}
localStorage.setItem("lastRate", rate);

/* ===== あと1日表示（神機能🔥） ===== */
let nextGoalText = "";

if(streak < 3){
 nextGoalText = `あと ${3 - streak} 日で3日連続🔥`;
}else if(streak < 10){
 nextGoalText = `あと ${10 - streak} 日で10日連続👑`;
}else{
 nextGoalText = "すごい！継続中🔥";
}

document.getElementById("nextGoal").innerText = nextGoalText;

/* ===== バッジ ===== */
let badgesHTML="";

function badge(name,condition){
 badgesHTML += `<span class="badge ${condition?"unlocked":""}">
 ${name}
 </span>`;
}

badge("初プレイ", totalPlay>=1);
badge("10回プレイ", totalPlay>=10);
badge("正解率80%", rate>=80);
badge("3日連続🔥", streak>=3);
badge("10日連続👑", streak>=10);

document.getElementById("badges").innerHTML = badgesHTML;

/* ===== カレンダー ===== */
let history = JSON.parse(localStorage.getItem("playHistory")||"[]");

let calHTML="";
let today = new Date();

for(let i=29;i>=0;i--){
 let d = new Date();
 d.setDate(today.getDate()-i);

 let str = d.toDateString();

 let played = history.includes(str);
 let isToday = (str === today.toDateString());

 calHTML += `<div class="day ${played?"played":""} ${isToday?"today":""}">
 ${d.getDate()}
 </div>`;
}

document.getElementById("calendar").innerHTML = calHTML;
</script>

</body>
</html>
