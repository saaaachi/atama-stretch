<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の問題</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
  overflow:hidden;
}

.container{
  text-align:center;
  padding:20px;
}

.top{
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:10px;
}

.ad{
  margin-bottom:10px;
}

.question{
  font-size:28px;
  margin:100px 0 30px;
}

.btn{
  display:block;
  width:80%;
  margin:10px auto;
  padding:20px;
  font-size:22px;
  border:none;
  border-radius:15px;
  background:#e0e7ff;
}

.result{
  font-size:26px;
  margin-top:20px;
}

.back{
  position:absolute;
  left:10px;
  top:10px;
}
</style>
</head>

<body>

<div class="top">
<button onclick="location.href='index.html'" class="back">←</button>

<div class="ad">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"></script>
<ins class="adsbygoogle"
     style="display:inline-block;width:320px;height:100px"
     data-ad-client="ca-pub-1299640300068792"
     data-ad-slot="7107118417"></ins>
</div>
</div>

<div class="container">

<div id="status"></div>
<div class="question" id="question"></div>

<button class="btn" onclick="answer(0)" id="btn1"></button>
<button class="btn" onclick="answer(1)" id="btn2"></button>

<div class="result" id="result"></div>

</div>

<script>

// 設定
let total = Number(localStorage.getItem("questionCount")) || 5;
let current = 0;
let correct = 0;
let used = [];

// 問題リスト
const questions = [];

// 計算問題生成
for(let i=0;i<30;i++){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  let correctAns = a+b;
  let wrong = correctAns + (Math.random()>0.5?1:-1);
  questions.push({
    q:`${a} + ${b} = ?`,
    a:[correctAns,wrong],
    c:0
  });
}

// 助詞
const joshi = [
["家に帰る","に"],
["学校に行く","に"],
["ご飯を食べる","を"],
["公園で遊ぶ","で"],
["椅子に座る","に"],
["水を飲む","を"]
];

joshi.forEach(j=>{
  questions.push({
    q:j[0].replace(/[にをで]/,"【に・を・で】"),
    a:["に","を"],
    c: j[1]=="に"?0:1
  });
});

// どっち問題
const animals = [
["いぬ","🐕","🐈"],
["ねこ","🐈","🐕"],
["りんご","🍎","🍌"],
["みかん","🍊","🍓"],
["バナナ","🍌","🍎"]
];

animals.forEach(a=>{
  questions.push({
    q:`${a[0]}はどっち？`,
    a:[a[1],a[2]],
    c:0
  });
});

// シャッフル
questions.sort(()=>Math.random()-0.5);

// 音声
function speak(text){
  let uttr = new SpeechSynthesisUtterance(text);
  uttr.lang="ja-JP";
  speechSynthesis.speak(uttr);
}

// 問題表示
function show(){
  document.getElementById("result").innerText="";

  // ラスト表示
  if(current === total-1){
    document.getElementById("status").innerText="ラスト問題！";
  }else{
    document.getElementById("status").innerText=`${current+1} / ${total}`;
  }

  let q = questions[current];

  document.getElementById("question").innerText=q.q;
  document.getElementById("btn1").innerText=q.a[0];
  document.getElementById("btn2").innerText=q.a[1];

  speak(q.q);

  // 広告更新（2問ごと）
  if(current % 2 === 0){
    (adsbygoogle = window.adsbygoogle || []).push({});
  }
}

// 回答
function answer(i){
  let q = questions[current];

  if(i === q.c){
    correct++;
    document.getElementById("result").innerText="⭕ 正解！";
  }else{
    document.getElementById("result").innerText="❌ 不正解";
  }

  setTimeout(()=>{
    current++;
    if(current >= total){
      finish();
    }else{
      show();
    }
  },800);
}

// 終了
function finish(){
  document.getElementById("status").innerText="";
  document.getElementById("question").innerText="お疲れ様でした！";
  document.getElementById("btn1").style.display="none";
  document.getElementById("btn2").style.display="none";
  document.getElementById("result").innerText=`${total}問中 ${correct}問正解！`;
}

// 初回
show();

</script>

</body>
</html>
