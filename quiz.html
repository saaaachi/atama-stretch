<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f7fb;
  text-align: center;
}

/* 上部 */
.top-bar {
  display: flex;
  align-items: center;
  padding: 10px;
}

.back-btn {
  font-size: 18px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #ddd;
}

/* 広告 */
.ad-box {
  margin: 10px auto;
}

/* 問題 */
.question-box {
  background: white;
  margin: 20px;
  padding: 30px;
  border-radius: 20px;
  font-size: 26px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ボタン */
.choice {
  display: block;
  width: 80%;
  margin: 15px auto;
  padding: 20px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: #e0e0e0;
}

.choice:active {
  transform: scale(0.97);
}

/* 結果 */
.result {
  font-size: 24px;
  margin-top: 20px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
</div>

<!-- 広告 -->
<div class="ad-box">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="7107118417"></ins>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<div id="progress"></div>

<div id="question" class="question-box"></div>

<div id="choices"></div>

<div id="result" class="result hidden"></div>

<script>

// ===== 設定 =====
let totalQuestions = Number(localStorage.getItem("questionCount")) || 5;

// ===== 状態 =====
let currentIndex = 0;
let correctCount = 0;
let currentAnswer = "";

// ===== 音 =====
const correctSound = new Audio("music/correct.mp3");
const wrongSound = new Audio("music/wrong.mp3");

// ===== 問題データ =====

// 計算
function createMath(){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  let correct = a + b;
  let wrong = correct + (Math.random()>0.5?1:-1);

  return {
    q: `${a} + ${b} = ?`,
    choices: shuffle([correct, wrong]),
    answer: correct
  };
}

// 助詞
const particles = [
  {q:"家【に・を】帰る", a:"に", b:"を", correct:"に"},
  {q:"水【に・を】飲む", a:"を", b:"に", correct:"を"},
  {q:"公園【に・で】遊ぶ", a:"で", b:"に", correct:"で"},
];

// どっち
const animals = [
  {q:"いぬはどっち？", a:"🐕", b:"🐈", correct:"🐕"},
  {q:"ねこはどっち？", a:"🐈", b:"🐕", correct:"🐈"},
];

// ===== 神経衰弱 =====
let memoryCards = [];
let opened = [];

function startMemory(){
  const base = ["🍎","🍓","🍊","🍌"];
  memoryCards = shuffle([...base,...base]);

  let html = "";
  memoryCards.forEach((v,i)=>{
    html += `<button class="choice" onclick="openCard(${i})">？</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("question").textContent = "神経衰弱";
}

function openCard(i){
  if(opened.length===2) return;

  let btns = document.getElementsByClassName("choice");
  btns[i].textContent = memoryCards[i];
  opened.push(i);

  if(opened.length===2){
    setTimeout(()=>{
      let [a,b] = opened;
      if(memoryCards[a] === memoryCards[b]){
        btns[a].disabled = true;
        btns[b].disabled = true;
      } else {
        btns[a].textContent = "？";
        btns[b].textContent = "？";
      }
      opened = [];

      // 全部一致でクリア
      if([...btns].every(b=>b.disabled)){
        correctCount++;
        nextQuestion();
      }

    },800);
  }
}

// ===== 出題 =====
function nextQuestion(){

  if(currentIndex >= totalQuestions){
    showResult();
    return;
  }

  currentIndex++;

  document.getElementById("progress").textContent =
    `${currentIndex} / ${totalQuestions}`;

  // 最後は神経衰弱
  if(currentIndex === totalQuestions){
    startMemory();
    return;
  }

  let type = Math.floor(Math.random()*3);
  let data;

  if(type===0) data = createMath();
  if(type===1){
    let p = particles[Math.floor(Math.random()*particles.length)];
    data = {
      q:p.q,
      choices:shuffle([p.a,p.b]),
      answer:p.correct
    };
  }
  if(type===2){
    let a = animals[Math.floor(Math.random()*animals.length)];
    data = {
      q:a.q,
      choices:shuffle([a.a,a.b]),
      answer:a.correct
    };
  }

  document.getElementById("question").textContent = data.q;

  // 読み上げ
  let u = new SpeechSynthesisUtterance(data.q);
  speechSynthesis.speak(u);

  currentAnswer = data.answer;

  let html="";
  data.choices.forEach(c=>{
    html += `<button class="choice" onclick="answer('${c}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML = html;

  // あと1問
  if(currentIndex === totalQuestions-1){
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("result").textContent = "あと1問です！✨";
  }
}

// ===== 回答 =====
function answer(choice){

  let isCorrect = choice == currentAnswer;

  if(isCorrect){
    correctSound.currentTime=0;
    correctSound.play();
    correctCount++;
  }else{
    wrongSound.currentTime=0;
    wrongSound.play();
  }

  setTimeout(nextQuestion,800);
}

// ===== 結果 =====
function showResult(){
  document.getElementById("question").textContent = "🎉 おつかれさまでした！";

  document.getElementById("choices").innerHTML = `
    <p>${totalQuestions}問中 ${correctCount}問正解！</p>
    <button class="choice" onclick="location.href='index.html'">ホームへ</button>
  `;
}

// ===== 共通 =====
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// スタート
nextQuestion();

</script>

</body>
</html>
