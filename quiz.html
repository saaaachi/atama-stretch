<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あたまのストレッチ</title>
</head>
<body>

<!-- ゲーム画面 -->
<div id="game-screen" style="display:none;">
  <h2>ゲーム画面</h2>

  <!-- BGMボタン -->
  <button onclick="toggleBGM()">🔊 音楽ON / OFF</button>
</div>
<audio id="bgm" loop>
  <source src="audio/bgm.mp3" type="audio/mpeg">
</audio>
<script>

const today = new Date().toLocaleDateString();
const lastSeen = localStorage.getItem("lastAdDate");

window.onload = function(){

  if(lastSeen !== today){
    showLoadingWithAd();
    localStorage.setItem("lastAdDate", today);
  } else {
    startGame();
  }

}

// 準備画面（広告）
function showLoadingWithAd(){

  try {
    (adsbygoogle = window.adsbygoogle || []).push({});
  } catch(e) {}

  setTimeout(() => {
    startGame();
  }, 1500);
}

// ゲーム開始
function startGame(){
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
}

// 🎵 BGM制御
let isPlaying = false;

function toggleBGM(){
  const bgm = document.getElementById("bgm");

  if(!isPlaying){
    bgm.play();
    isPlaying = true;
  } else {
    bgm.pause();
    isPlaying = false;
  }
}

</script>
</body>
</html>
