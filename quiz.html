<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
}

.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
 box-sizing:border-box;
}

.ad{
 margin-top:60px;
 text-align:center;
 min-height:110px;
}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:10px 15px;
}

.container{
 text-align:center;
 padding:10px;
}

.question{
 font-size:34px;
 margin:20px 0;
}

.btn{
 width:90%;
 margin:10px auto;
 padding:20px;
 font-size:24px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
}

.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

.memory{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
}

.card{
 height:80px;
 background:#b2bec3;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
}

.matched{
 background:#b9fbc0!important;
}

.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border:none;
 border-radius:22px;
 background:#74b9ff;
 color:white;
 margin-top:30px;
}
</style>
</head>

<body>

<div class="header">
 <div onclick="location.href='index.html'">←</div>
 <div>問題</div>
</div>

<div class="ad" id="adArea"></div>

<div class="topbar">
 <div id="progress"></div>
</div>

<div class="container" id="container">
 <div id="last" style="color:red;font-weight:bold;"></div>
 <div id="question" class="question"></div>
 <div id="answers"></div>
</div>

<script>

/* ===== 設定 ===== */
let total=Number(localStorage.getItem("questionCount"))||5;

let useCalc = localStorage.getItem("useCalc") !== "false";
let useJosi = localStorage.getItem("useJosi") !== "false";
let useWhich = localStorage.getItem("useWhich") !== "false";
let useMemory = localStorage.getItem("useMemory") !== "false";

let normalTotal = useMemory ? total - 1 : total;

/* ===== データ（20問そのまま維持） ===== */
const josiList=[
 ["家","に","帰る"],["学校","へ","行く"],["公園","で","遊ぶ"],["友達","と","話す"],
 ["駅","に","行く"],["部屋","で","寝る"],["店","で","買う"],["先生","に","聞く"],
 ["友達","に","会う"],["海","で","泳ぐ"],["会社","へ","行く"],["家族","と","食べる"],
 ["車","で","行く"],["電車","で","帰る"],["犬","と","遊ぶ"],["本","を","読む"],
 ["テレビ","を","見る"],["音楽","を","聞く"],["道","を","歩く"],["手紙","を","書く"]
];

const whichList=[
 ["🐶","🐱","いぬ"],["🍎","🍌","りんご"],["🚗","🚲","くるま"],["🐟","🐔","さかな"],
 ["🌞","🌙","たいよう"],["🍓","🍇","いちご"],["📱","💻","スマホ"],["✈️","🚢","ひこうき"],
 ["👟","👠","くつ"],["🍔","🍕","ハンバーガー"],["🐸","🐍","かえる"],["🐧","🦅","ペンギン"],
 ["🌸","🌻","さくら"],["🎹","🎸","ピアノ"],["🍙","🍞","おにぎり"],["🚓","🚑","パトカー"],
 ["📚","📰","ほん"],["🎂","🍩","ケーキ"],["🐼","🐨","パンダ"],["🐝","🦋","はち"]
];

const memorySets=[
 ["🍎","🍊","🍌"],
 ["🐶","🐱","🐼"],
 ["🚗","🚲","✈️"]
];

function shuffle(arr){
 return [...arr].sort(()=>Math.random()-0.5);
}

let josiQueue = useJosi ? shuffle(josiList) : [];
let whichQueue = useWhich ? shuffle(whichList) : [];

let current=0,score=0;

/* ===== 出題 ===== */
function next(){

 answers.innerHTML="";
 answers.className="";

 if(current >= total){
  container.innerHTML=
  `<h2>🎉 おつかれさま！</h2>
   <p>${score}/${total} 正解！</p>
   <button class="big-home-btn" onclick="location.href='index.html'">ホームへ</button>`;
  return;
 }

 current++;

 /* ===== 神経衰弱（最後） ===== */
 if(useMemory && current > normalTotal){
   startMemory();
   return;
 }

 /* ===== ★広告（安定版） ===== */
 if(current % 2 === 1){
   let ad=document.getElementById("adArea");

   ad.innerHTML = `
   <ins class="adsbygoogle"
     style="display:inline-block;width:320px;height:100px"
     data-ad-client="ca-pub-1299640300068792"
     data-ad-slot="7107118417"></ins>
   `;

   (adsbygoogle = window.adsbygoogle || []).push({});
 }

 progress.innerText=current+" / "+total;
 last.innerText=(current===total)?"ラスト問題！":"";

 let types=[];
 if(useCalc) types.push("calc");
 if(useJosi) types.push("josi");
 if(useWhich) types.push("which");

 let type = types[current % types.length];

 if(type==="josi"){
   if(josiQueue.length===0) josiQueue=shuffle(josiList);
   let x=josiQueue.pop();
   let wrong=["に","で","と","を","へ"].filter(p=>p!==x[1]);
   renderChoice(`${x[0]}【${x[1]}・${wrong[0]}】${x[2]}`,[x[1],wrong[0]],x[1]);
 }

 if(type==="which"){
   if(whichQueue.length===0) whichQueue=shuffle(whichList);
   let x=whichQueue.pop();
   renderChoice(`${x[2]}はどっち？`,[x[0],x[1]],x[0]);
 }
}

/* ===== 選択 ===== */
function renderChoice(q,choices,answer){
 question.innerText=q;

 choices.sort(()=>Math.random()-0.5);

 choices.forEach(c=>{
   let btn=document.createElement("button");
   btn.className="btn";
   btn.innerText=c;

   btn.onclick=()=>{
     if(c===answer){
       btn.classList.add("correct");
       score++;
     }else{
       btn.classList.add("wrong");
     }
     setTimeout(next,800);
   };

   answers.appendChild(btn);
 });
}

/* ===== 神経衰弱（3ペア） ===== */
function startMemory(){

 question.innerText="神経衰弱";

 let set=memorySets[Math.floor(Math.random()*memorySets.length)];
 let cards=shuffle([...set,...set]);

 let open=[],matched=0,lock=false;

 answers.className="memory";

 cards.forEach(card=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerText="?";

  div.onclick=()=>{
   if(lock||div.innerText!=="?")return;

   div.innerText=card;
   open.push({div,card});

   if(open.length===2){
    lock=true;
    let[a,b]=open;

    if(a.card===b.card){
      a.div.classList.add("matched");
      b.div.classList.add("matched");
      matched+=2;
      open=[];lock=false;

      if(matched===6){
        score++;
        setTimeout(next,800);
      }
    }else{
      setTimeout(()=>{
        a.div.innerText="?";
        b.div.innerText="?";
        open=[];lock=false;
      },700);
    }
   }
  };

  answers.appendChild(div);
 });
}

next();
</script>

</body>
</html>
