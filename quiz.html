<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f7fb;
  text-align: center;
  overflow: hidden; /* ←スクロール禁止 */
}

/* 上 */
.top-bar {
  display: flex;
  padding: 10px;
}

.back-btn {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* 広告 */
.ad-box {
  margin: 5px;
}

/* 問題 */
.question {
  font-size: 28px;
  margin: 20px;
}

/* ボタン */
.choice {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 18px;
  font-size: 24px;
  border-radius: 15px;
  border: none;
}

/* 神経衰弱 */
.memory {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  font-size: 30px;
  padding: 20px;
  border-radius: 10px;
}

/* メッセージ */
.message {
  font-size: 20px;
  color: #666;
}
</style>
</head>

<body>

<div class="top-bar">
<button class="back-btn" onclick="location.href='index.html'">←</button>
</div>

<div class="ad-box">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="7107118417"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="progress"></div>
<div id="message" class="message"></div>
<div id="question" class="question"></div>
<div id="choices"></div>

<script>

// ===== 設定 =====
let total = Number(localStorage.getItem("questionCount")) || 5;

// ===== 状態 =====
let index = 0;
let correct = 0;
let used = [];
let answer = "";

// ===== 音 =====
const okSound = new Audio("music/correct.mp3");
const ngSound = new Audio("music/wrong.mp3");

// ===== 問題 =====

// 計算
function math(){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  let c = a + b;
  return {
    q: `${a}+${b}=?`,
    choices: shuffle([c, c+1]),
    answer: c
  };
}

// 助詞
const particles = [
  {q:"家【に・を】帰る", a:"に", b:"を", ans:"に"},
  {q:"水【に・を】飲む", a:"を", b:"に", ans:"を"},
  {q:"公園【に・で】遊ぶ", a:"で", b:"に", ans:"で"},
  {q:"学校【に・で】勉強する", a:"で", b:"に", ans:"で"},
];

// どっち（増量✨）
const which = [
  {q:"いぬはどっち？", a:"🐕", b:"🐈", ans:"🐕"},
  {q:"ねこはどっち？", a:"🐈", b:"🐕", ans:"🐈"},
  {q:"りんごはどっち？", a:"🍎", b:"🍌", ans:"🍎"},
  {q:"バナナはどっち？", a:"🍌", b:"🍎", ans:"🍌"},
  {q:"いちごはどっち？", a:"🍓", b:"🍇", ans:"🍓"},
  {q:"ぶどうはどっち？", a:"🍇", b:"🍓", ans:"🍇"},
];

// ===== 神経衰弱 =====
let mem = [];
let open = [];

function startMemory(){
  const base = ["🍎","🍓","🍊","🍌"];
  mem = shuffle([...base,...base]);

  let html = `<div class="memory">`;
  mem.forEach((v,i)=>{
    html += `<button class="card" onclick="openCard(${i})">？</button>`;
  });
  html += `</div>`;

  document.getElementById("question").textContent = "神経衰弱";
  document.getElementById("choices").innerHTML = html;
}

function openCard(i){
  let cards = document.getElementsByClassName("card");
  if(open.length===2 || cards[i].textContent!=="？") return;

  cards[i].textContent = mem[i];
  open.push(i);

  if(open.length===2){
    setTimeout(()=>{
      let [a,b] = open;

      if(mem[a] === mem[b]){
        cards[a].disabled = true;
        cards[b].disabled = true;
      }else{
        cards[a].textContent = "？";
        cards[b].textContent = "？";
      }

      open=[];

      if([...cards].every(c=>c.disabled)){
        correct++;
        next();
      }

    },700);
  }
}

// ===== 出題 =====
function next(){

  if(index >= total){
    finish();
    return;
  }

  index++;
  document.getElementById("progress").textContent = `${index}/${total}`;
  document.getElementById("message").textContent = "";

  // 最後
  if(index === total){
    startMemory();
    return;
  }

  let data;

  do {
    let t = Math.floor(Math.random()*3);
    if(t===0) data = math();
    if(t===1){
      let p = particles[Math.floor(Math.random()*particles.length)];
      data = {q:p.q, choices:shuffle([p.a,p.b]), answer:p.ans};
    }
    if(t===2){
      let w = which[Math.floor(Math.random()*which.length)];
      data = {q:w.q, choices:shuffle([w.a,w.b]), answer:w.ans};
    }
  } while(used.includes(data.q));

  used.push(data.q);

  document.getElementById("question").textContent = data.q;

  // 読み上げ
  speechSynthesis.speak(new SpeechSynthesisUtterance(data.q));

  answer = data.answer;

  let html="";
  data.choices.forEach(c=>{
    html += `<button class="choice" onclick="check('${c}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML = html;

  if(index === total-1){
    document.getElementById("message").textContent = "あと1問です！✨";
  }
}

// ===== 回答 =====
function check(c){

  if(c == answer){
    okSound.currentTime=0;
    okSound.play();
    correct++;
  } else {
    ngSound.currentTime=0;
    ngSound.play();
  }

  setTimeout(next,600);
}

// ===== 終了 =====
function finish(){
  document.getElementById("message").textContent = ""; // ←バグ修正
  document.getElementById("question").textContent = "🎉 おつかれさまでした！";

  document.getElementById("choices").innerHTML = `
    <p>${total}問中 ${correct}問正解！</p>
    <button class="choice" onclick="location.href='index.html'">ホームへ</button>
  `;
}

// ===== util =====
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

next();

</script>

</body>
</html>
