<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
  overflow:hidden;
}

/* 上固定 */
.top{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  padding:10px;
  z-index:10;
}

/* 戻る */
.back{
  position:absolute;
  left:10px;
  top:10px;
  font-size:18px;
}

/* 広告 */
.ad{
  margin-top:40px;
}

/* メイン */
.container{
  margin-top:190px; /* ←広告かぶり対策 */
  text-align:center;
}

/* 問題 */
.question{
  font-size:30px;
  margin-bottom:25px;
}

/* ステータス */
.status{
  font-size:18px;
  margin-bottom:10px;
}

/* ボタン */
.btn{
  display:block;
  width:85%;
  margin:12px auto;
  padding:20px;
  font-size:24px;
  border:none;
  border-radius:18px;
  background:#e0e7ff;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.96);
}

/* 正解 */
.correct{
  background:#b9fbc0 !important;
}

/* 不正解 */
.wrong{
  background:#ffadad !important;
  animation:shake 0.3s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

/* 神経衰弱 */
.memory{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  padding:18px;
  font-size:26px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="top">
<button onclick="location.href='index.html'" class="back">←</button>

<div class="ad">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"></script>
<ins class="adsbygoogle"
     style="display:inline-block;width:320px;height:100px"
     data-ad-client="ca-pub-1299640300068792"
     data-ad-slot="7107118417"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
</div>

<div class="container">

<div id="status" class="status"></div>
<div id="question" class="question"></div>
<div id="choices"></div>
<div id="result"></div>

</div>

<script>

// ===== 設定 =====
let total = Number(localStorage.getItem("questionCount")) || 5;

// ===== 状態 =====
let current = 0;
let correct = 0;
let used = [];
let currentAnswer = "";

// ===== 音 =====
const ok = new Audio("music/correct.mp3");
const ng = new Audio("music/wrong.mp3");

// ===== シャッフル =====
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

// ===== 計算 =====
function createMath(){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  let ans = a+b;
  let wrong = ans + (Math.random()>0.5?1:-1);

  let choices = shuffle([ans, wrong]);

  return {
    q:`${a}+${b}=?`,
    choices:choices,
    answer:ans
  };
}

// ===== 助詞 =====
const particles = [
  {q:"家【に・を】帰る", answer:"に"},
  {q:"水【に・を】飲む", answer:"を"},
  {q:"公園【で・に】遊ぶ", answer:"で"},
  {q:"学校【で・に】勉強する", answer:"で"}
];

// ===== どっち =====
const which = [
  {q:"いぬはどっち？", a:"🐕", b:"🐈", ans:"🐕"},
  {q:"ねこはどっち？", a:"🐈", b:"🐕", ans:"🐈"},
  {q:"りんごはどっち？", a:"🍎", b:"🍌", ans:"🍎"},
  {q:"バナナはどっち？", a:"🍌", b:"🍎", ans:"🍌"},
  {q:"いちごはどっち？", a:"🍓", b:"🍇", ans:"🍓"},
  {q:"ぶどうはどっち？", a:"🍇", b:"🍓", ans:"🍇"}
];

// ===== 神経衰弱 =====
let mem = [];
let open = [];

function startMemory(){
  const base = ["🍎","🍓","🍊","🍌"];
  mem = shuffle([...base,...base]);

  let html = `<div class="memory">`;
  mem.forEach((v,i)=>{
    html += `<button class="card" onclick="openCard(${i})">？</button>`;
  });
  html += `</div>`;

  document.getElementById("question").innerText="ラスト問題！神経衰弱";
  document.getElementById("choices").innerHTML=html;
}

function openCard(i){
  let cards = document.getElementsByClassName("card");
  if(open.length===2 || cards[i].textContent!=="？") return;

  cards[i].textContent = mem[i];
  open.push(i);

  if(open.length===2){
    setTimeout(()=>{
      let [a,b]=open;

      if(mem[a]===mem[b]){
        cards[a].disabled=true;
        cards[b].disabled=true;
      }else{
        cards[a].textContent="？";
        cards[b].textContent="？";
      }

      open=[];

      if([...cards].every(c=>c.disabled)){
        correct++;
        next();
      }

    },700);
  }
}

// ===== 出題 =====
function next(){

  if(current >= total){
    finish();
    return;
  }

  // ラスト
  if(current === total-1){
    document.getElementById("status").innerText="ラスト問題！";
    startMemory();
    current++;
    return;
  }

  current++;
  document.getElementById("status").innerText=`${current}/${total}`;

  let data;

  do{
    let t = Math.floor(Math.random()*3);

    if(t===0) data = createMath();

    if(t===1){
      let p = particles[Math.floor(Math.random()*particles.length)];
      let choices = shuffle(["に","を","で"]).slice(0,2); // 必ず2択
      if(!choices.includes(p.answer)){
        choices[0] = p.answer;
        choices = shuffle(choices);
      }

      data = {
        q:p.q,
        choices:choices,
        answer:p.answer
      };
    }

    if(t===2){
      let w = which[Math.floor(Math.random()*which.length)];
      data = {
        q:w.q,
        choices:shuffle([w.a,w.b]),
        answer:w.ans
      };
    }

  }while(used.includes(data.q));

  used.push(data.q);

  document.getElementById("question").innerText=data.q;

  speechSynthesis.speak(new SpeechSynthesisUtterance(data.q));

  currentAnswer = data.answer;

  let html="";
  data.choices.forEach(c=>{
    html += `<button class="btn" onclick="answer('${c}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML=html;

  // 広告更新（2問ごと）
  if(current % 2 === 0){
    (adsbygoogle = window.adsbygoogle || []).push({});
  }
}

// ===== 回答 =====
function answer(c){

  let buttons = document.querySelectorAll(".btn");

  buttons.forEach(b=>{
    if(b.innerText == c){

      if(c === currentAnswer){
        b.classList.add("correct");
        ok.currentTime=0;
        ok.play();
        correct++;
      }else{
        b.classList.add("wrong");
        ng.currentTime=0;
        ng.play();
      }
    }
    b.disabled = true;
  });

  setTimeout(next,700);
}

// ===== 終了 =====
function finish(){
  document.getElementById("status").innerText="";
  document.getElementById("question").innerText="🎉 おつかれさまでした！";

  document.getElementById("choices").innerHTML=`
    <p style="font-size:22px">${total}問中 ${correct}問正解！</p>
    <button class="btn" onclick="location.href='index.html'">ホームへ</button>
  `;
}

// スタート
next();

</script>

</body>
</html>
