<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 overflow:hidden;
}

/* ヘッダー */
.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
}

.back{
 font-size:20px;
 cursor:pointer;
}

.title{
 font-size:18px;
 font-weight:bold;
}

/* 音楽ボタン */
.audio-controls{
 display:flex;
 gap:8px;
}

.audio-btn{
 padding:6px 10px;
 border:none;
 border-radius:8px;
 background:#dfe6e9;
 font-size:12px;
}

/* 広告 */
.ad{
 margin-top:60px;
 text-align:center;
 min-height:110px;
}

/* メイン */
.container{
 text-align:center;
 padding:15px;
}

.question{
 font-size:32px;
 margin:20px 0;
}

.btn{
 width:90%;
 margin:10px auto;
 padding:20px;
 font-size:24px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
 transition:.2s;
}

.btn:active{transform:scale(.95);}
.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

/* 神経衰弱 */
.memory{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.card{
 height:75px;
 background:#b2bec3;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
}

.matched{
 background:#b9fbc0 !important;
}

/* ホーム */
.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border-radius:22px;
 border:none;
 background:#74b9ff;
 color:white;
 margin-top:30px;
}

/* 波紋 */
.wave{
 position:fixed;
 top:45%;
 left:50%;
 transform:translate(-50%,-50%);
 width:200px;
 height:200px;
 pointer-events:none;
 z-index:999;
}

.wave::before,.wave::after{
 content:"";
 position:absolute;
 border-radius:50%;
 border:3px solid rgba(100,150,255,0.4);
 width:100%;
 height:100%;
 animation:ripple 2.5s infinite;
}

.wave::after{animation-delay:1.2s;}

@keyframes ripple{
 0%{transform:scale(.5);opacity:.7;}
 100%{transform:scale(2);opacity:0;}
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="location.href='index.html'">←</div>

  <div class="audio-controls">
    <button class="audio-btn" onclick="toggleBGM()">BGM</button>
    <label>
      γ
      <input type="checkbox" id="gammaToggle">
    </label>
  </div>

  <div class="title">問題</div>
</div>

<div class="ad" id="adArea">
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="7107118417"></ins>
</div>

<div class="container">
<div id="progress"></div>
<div id="last" style="color:red;font-weight:bold;"></div>
<div id="question" class="question"></div>
<div id="answers"></div>
</div>

<div id="waveEffect" class="wave hidden"></div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

/* ===== 音 ===== */
let bgm = new Audio("music/bgm.mp3");
bgm.loop = true;

let gamma = new Audio("music/gamma.mp3");
gamma.loop = true;

let playing = false;

const wave = document.getElementById("waveEffect");

function toggleBGM(){
 if(playing){
   bgm.pause();
   playing=false;
   stopWave();
 }else{
   bgm.play();
   playing=true;
   startWave();
 }
}

document.getElementById("gammaToggle").addEventListener("change",e=>{
 if(e.target.checked){
   gamma.play();
   startWave();
 }else{
   gamma.pause();
   checkWave();
 }
});

function startWave(){ wave.classList.remove("hidden"); }
function stopWave(){ if(!gamma.paused) return; wave.classList.add("hidden"); }
function checkWave(){
 if(!playing && gamma.paused){
   wave.classList.add("hidden");
 }
}

/* ===== 問題 ===== */
let total = Number(localStorage.getItem("questionCount")) || 5;
let current = 0;
let score = 0;

const josiList = [["家","に","帰る"],["学校","へ","行く"],["公園","で","遊ぶ"]];
const whichList = [["🐶","🐱","いぬ"],["🍎","🍌","りんご"]];
const memorySets = [["🍎","🍓","🍊","🍌"]];

function next(){

 document.getElementById("answers").innerHTML="";

 if(current>=total){
   document.querySelector(".container").innerHTML=
   `<h2>🎉 おつかれさま！</h2>
    <p>${score}/${total}</p>
    <button class="big-home-btn" onclick="location.href='index.html'">ホームへ</button>`;
   return;
 }

 current++;
 document.getElementById("progress").innerText=current+" / "+total;
 document.getElementById("last").innerText=(current===total)?"ラスト問題！":"";

 if(current===total){ startMemory(); return; }

 let type=Math.random()<0.5?"josi":"which";

 if(type==="josi"){
   let x=josiList[Math.floor(Math.random()*josiList.length)];
   renderChoice(`${x[0]}【に・で】${x[2]}`,["に","で"],x[1]);
 }else{
   let x=whichList[Math.floor(Math.random()*whichList.length)];
   renderChoice(`${x[2]}はどっち？`,[x[0],x[1]],x[0]);
 }
}

function renderChoice(q,choices,answer){
 document.getElementById("question").innerText=q;

 choices.forEach(c=>{
   let btn=document.createElement("button");
   btn.className="btn";
   btn.innerText=c;

   btn.onclick=()=>{
     if(c===answer){
       btn.classList.add("correct");
       score++;
     }else{
       btn.classList.add("wrong");
     }
     setTimeout(next,800);
   };

   document.getElementById("answers").appendChild(btn);
 });
}

function startMemory(){
 document.getElementById("question").innerText="神経衰弱";

 let set=memorySets[0];
 let cards=[...set,...set].sort(()=>Math.random()-0.5);

 let open=[];
 let matched=0;
 let lock=false;

 let area=document.getElementById("answers");
 area.className="memory";

 cards.forEach(card=>{
   let div=document.createElement("div");
   div.className="card";
   div.innerText="?";

   div.onclick=()=>{
     if(lock||div.innerText!=="?") return;

     div.innerText=card;
     open.push({div,card});

     if(open.length===2){
       lock=true;
       let [a,b]=open;

       if(a.card===b.card){
         a.div.classList.add("matched");
         b.div.classList.add("matched");
         matched+=2;
         open=[];
         lock=false;

         if(matched===8){
           score++;
           setTimeout(next,800);
         }

       }else{
         setTimeout(()=>{
           a.div.innerText="?";
           b.div.innerText="?";
           open=[];
           lock=false;
         },700);
       }
     }
   };

   area.appendChild(div);
 });
}

next();
</script>

</body>
</html>
