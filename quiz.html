<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 overflow:hidden;
}

/* ヘッダー */
.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 15px;
}

.back{font-size:20px;}
.title{font-weight:bold;}

/* 上バー */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-top:70px;
 padding:0 15px;
}

.audio{
 display:flex;
 gap:6px;
 align-items:center;
 font-size:12px;
}

.audio button{
 border:none;
 padding:5px 8px;
 border-radius:8px;
 background:#dfe6e9;
}

.audio input[type="range"]{
 width:60px;
}

/* 広告 */
.ad{text-align:center;min-height:110px;}

/* 問題 */
.container{text-align:center;padding:10px;}
.question{font-size:34px;margin:20px 0;}

.btn{
 width:90%;
 margin:10px auto;
 padding:20px;
 font-size:24px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
}

.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

/* 神経衰弱 */
.memory{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.card{
 height:75px;
 background:#b2bec3;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
}

.matched{background:#b9fbc0!important;}

/* ホーム */
.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border:none;
 border-radius:22px;
 background:#74b9ff;
 color:white;
 margin-top:30px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="location.href='index.html'">←</div>
  <div class="title">問題</div>
</div>

<div class="topbar">
  <div id="progress"></div>

  <div class="audio">
    <button onclick="toggleBGM()">BGM</button>
    <label>γ<input type="checkbox" id="gammaToggle"></label>
    <input type="range" id="gammaVol" min="0" max="1" step="0.1" value="0.5">
  </div>
</div>

<div class="ad" id="adArea">
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="7107118417"></ins>
</div>

<div class="container">
<div id="last" style="color:red;font-weight:bold;"></div>
<div id="question" class="question"></div>
<div id="answers"></div>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

/* ===== 音 ===== */
let bgm=new Audio("music/bgm.mp3"); bgm.loop=true;
let gamma=new Audio("music/gamma.mp3"); gamma.loop=true; gamma.volume=0.5;
let playing=false;

function toggleBGM(){
 playing ? bgm.pause() : bgm.play();
 playing=!playing;
}

gammaToggle.onchange=e=>{
 e.target.checked ? gamma.play() : gamma.pause();
}

gammaVol.oninput=e=>{
 gamma.volume=e.target.value;
}

/* ===== 設定読み込み ===== */
let total=Number(localStorage.getItem("questionCount"))||5;

let useJosi = localStorage.getItem("useJosi") !== "false";
let useWhich = localStorage.getItem("useWhich") !== "false";
let useMemory = localStorage.getItem("useMemory") !== "false";

/* ===== データ ===== */
const josiList=[
["家","に","帰る"],["学校","へ","行く"],["公園","で","遊ぶ"],["友達","と","話す"],
["駅","に","行く"],["部屋","で","寝る"],["店","で","買う"],["先生","に","聞く"],
["友達","に","会う"],["海","で","泳ぐ"],["会社","へ","行く"],["家族","と","食べる"],
["車","で","行く"],["電車","で","帰る"],["犬","と","遊ぶ"],["本","を","読む"],
["テレビ","を","見る"],["音楽","を","聞く"],["道","を","歩く"],["手紙","を","書く"]
];

const whichList=[
["🐶","🐱","いぬ"],["🍎","🍌","りんご"],["🚗","🚲","くるま"],["🐟","🐔","さかな"],
["🌞","🌙","たいよう"],["🍓","🍇","いちご"],["📱","💻","スマホ"],["✈️","🚢","ひこうき"],
["👟","👠","くつ"],["🍔","🍕","ハンバーガー"],["🐸","🐍","かえる"],["🐧","🦅","ペンギン"],
["🌸","🌻","さくら"],["🎹","🎸","ピアノ"],["🍙","🍞","おにぎり"],["🚓","🚑","パトカー"],
["📚","📰","ほん"],["🎂","🍩","ケーキ"],["🐼","🐨","パンダ"],["🐝","🦋","はち"]
];

const memorySets=[
["🍎","🍓","🍊","🍌"],
["🐶","🐱","🐼","🐸"],
["🚗","🚲","✈️","🚀"]
];

/* ===== シャッフル ===== */
function shuffle(arr){
 return [...arr].sort(()=>Math.random()-0.5);
}

/* ===== キュー生成 ===== */
let josiQueue = useJosi ? shuffle(josiList) : [];
let whichQueue = useWhich ? shuffle(whichList) : [];

let toggleType = true;

let current=0,score=0;

/* ===== 出題 ===== */
function next(){

 answers.innerHTML="";

 if(current>=total){
  container.innerHTML=
  `<h2>🎉 おつかれさま！</h2>
   <p>${score}/${total}</p>
   <button class="big-home-btn" onclick="location.href='index.html'">ホームへ</button>`;
  return;
 }

 current++;
 progress.innerText=current+" / "+total;
 last.innerText=(current===total)?"ラスト問題！":"";

 /* ラスト */
 if(current===total && useMemory){
   startMemory();
   return;
 }

 let type;

 if(!useJosi && !useWhich){
   question.innerText="問題が選択されていません";
   return;
 }

 if(!useJosi) type="which";
 else if(!useWhich) type="josi";
 else{
   if(josiQueue.length===0) type="which";
   else if(whichQueue.length===0) type="josi";
   else{
     type = toggleType ? "josi" : "which";
     toggleType=!toggleType;
   }
 }

 if(type==="josi"){
   let x=josiQueue.pop();
   let wrong=["に","で","と","を","へ"].filter(p=>p!==x[1]);
   renderChoice(`${x[0]}【${x[1]}・${wrong[0]}】${x[2]}`,[x[1],wrong[0]],x[1]);
 }

 if(type==="which"){
   let x=whichQueue.pop();
   renderChoice(`${x[2]}はどっち？`,[x[0],x[1]],x[0]);
 }
}

/* ===== 選択 ===== */
function renderChoice(q,choices,answer){

 question.innerText=q;

 choices.sort(()=>Math.random()-0.5);

 choices.forEach(c=>{
   let btn=document.createElement("button");
   btn.className="btn";
   btn.innerText=c;

   btn.onclick=()=>{
     if(c===answer){btn.classList.add("correct");score++;}
     else{btn.classList.add("wrong");}
     setTimeout(next,800);
   };

   answers.appendChild(btn);
 });
}

/* ===== 神経衰弱 ===== */
function startMemory(){

 question.innerText="神経衰弱";

 let set=memorySets[Math.floor(Math.random()*memorySets.length)];
 let cards=shuffle([...set,...set]);

 let open=[],matched=0,lock=false;

 answers.className="memory";

 cards.forEach(card=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerText="?";

  div.onclick=()=>{
   if(lock||div.innerText!=="?")return;

   div.innerText=card;
   open.push({div,card});

   if(open.length===2){
    lock=true;
    let[a,b]=open;

    if(a.card===b.card){
      a.div.classList.add("matched");
      b.div.classList.add("matched");
      matched+=2;
      open=[];lock=false;

      if(matched===8){score++;setTimeout(next,800);}
    }else{
      setTimeout(()=>{
        a.div.innerText="?";
        b.div.innerText="?";
        open=[];lock=false;
      },700);
    }
   }
  };

  answers.appendChild(div);
 });
}

next();
</script>

</body>
</html>
