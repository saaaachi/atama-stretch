<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問題</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 overflow:hidden;
}

/* 上 */
.header{
 position:fixed;
 top:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 align-items:center;
 padding:10px;
}

.back{
 font-size:20px;
 cursor:pointer;
}

/* 広告 */
.ad{
 margin-top:60px;
 text-align:center;
 min-height:110px;
}

/* メイン */
.container{
 text-align:center;
 padding:15px;
}

.question{
 font-size:30px;
 margin:20px 0;
}

.btn{
 width:90%;
 margin:10px auto;
 padding:18px;
 font-size:22px;
 border-radius:15px;
 border:none;
 background:#dfe6e9;
 transition:.2s;
}

.btn:active{transform:scale(.95);}
.correct{background:#81ecec;}
.wrong{background:#fab1a0;}

/* 神経衰弱 */
.memory{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}

.card{
 height:70px;
 background:#b2bec3;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:28px;
 transition:.3s;
}

.matched{
 background:#b9fbc0 !important;
 opacity:0.8;
 transform:scale(0.95);
}

/* ⭐ホームボタン（特大） */
.big-home-btn{
 width:92%;
 padding:30px;
 font-size:28px;
 border-radius:22px;
 border:none;
 background:#74b9ff;
 color:white;
 margin-top:30px;
 box-shadow:0 8px 20px rgba(0,0,0,0.2);
 transition:0.2s;
}

.big-home-btn:active{
 transform:scale(0.96);
}
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="location.href='index.html'">←</div>
</div>

<div class="ad" id="adArea">
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="7107118417"></ins>
</div>

<div class="container">
<div id="progress"></div>
<div id="last" style="color:red;font-weight:bold;"></div>
<div id="question" class="question"></div>
<div id="answers"></div>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

/* ===== 設定 ===== */
let total = Number(localStorage.getItem("questionCount")) || 5;

let current = 0;
let score = 0;

/* ===== データ ===== */
const josiList = [
["家","に","帰る"],["学校","へ","行く"],["公園","で","遊ぶ"],["友達","と","話す"],
["駅","に","行く"],["部屋","で","寝る"],["店","で","買う"],["先生","に","聞く"],
["友達","に","会う"],["海","で","泳ぐ"],["会社","へ","行く"],["家族","と","食べる"],
["車","で","行く"],["電車","で","帰る"],["犬","と","遊ぶ"],["本","を","読む"],
["テレビ","を","見る"],["音楽","を","聞く"],["道","を","歩く"],["手紙","を","書く"]
];

const whichList = [
["🐶","🐱","いぬ"],["🍎","🍌","りんご"],["🚗","🚲","くるま"],["🐟","🐔","さかな"],
["🌞","🌙","たいよう"],["🍓","🍇","いちご"],["📱","💻","スマホ"],["✈️","🚢","ひこうき"],
["👟","👠","くつ"],["🍔","🍕","ハンバーガー"],["🐸","🐍","かえる"],["🐧","🦅","ペンギン"],
["🌸","🌻","さくら"],["🎹","🎸","ピアノ"],["🍙","🍞","おにぎり"],["🚓","🚑","パトカー"],
["📚","📰","ほん"],["🎂","🍩","ケーキ"],["🐼","🐨","パンダ"],["🐝","🦋","はち"]
];

const memorySets = [
["🍎","🍓","🍊","🍌"],
["🐶","🐱","🐼","🐸"],
["🚗","🚲","✈️","🚀"]
];

let used = new Set();

/* ===== 出題 ===== */
function next(){

 document.getElementById("answers").innerHTML="";

 if(current>=total){
   document.querySelector(".container").innerHTML=
   `<h2>🎉 おつかれさまでした！</h2>
    <p style="font-size:24px">${score} / ${total} 正解！</p>
    <button class="big-home-btn" onclick="location.href='index.html'">
    🏠 ホームへ戻る
    </button>`;
   return;
 }

 current++;

 document.getElementById("progress").innerText=current+" / "+total;
 document.getElementById("last").innerText=(current===total)?"ラスト問題！":"";

 if(current % 2 === 1){
   let ad=document.getElementById("adArea");
   ad.innerHTML=`<ins class="adsbygoogle"
   style="display:inline-block;width:320px;height:100px"
   data-ad-client="ca-pub-1299640300068792"
   data-ad-slot="7107118417"></ins>`;
   (adsbygoogle = window.adsbygoogle || []).push({});
 }

 if(current === total){
   startMemory();
   return;
 }

 let type=Math.random()<0.5?"josi":"which";

 if(type==="josi"){
   let i;
   do{i=Math.floor(Math.random()*josiList.length);}
   while(used.has("j"+i));
   used.add("j"+i);

   let x=josiList[i];
   let wrong=["に","で","と","を","へ"].filter(p=>p!==x[1]);

   renderChoice(`${x[0]}【${x[1]}・${wrong[0]}】${x[2]}`,[x[1],wrong[0]],x[1]);
 }

 if(type==="which"){
   let i;
   do{i=Math.floor(Math.random()*whichList.length);}
   while(used.has("w"+i));
   used.add("w"+i);

   let x=whichList[i];
   renderChoice(`${x[2]}はどっち？`,[x[0],x[1]],x[0]);
 }
}

/* ===== 選択問題 ===== */
function renderChoice(q,choices,answer){

 document.getElementById("question").innerText=q;

 choices.sort(()=>Math.random()-0.5);

 choices.forEach(c=>{
   let btn=document.createElement("button");
   btn.className="btn";
   btn.innerText=c;

   btn.onclick=()=>{
     if(c===answer){
       btn.classList.add("correct");
       score++;
     }else{
       btn.classList.add("wrong");
     }
     setTimeout(next,800);
   };

   document.getElementById("answers").appendChild(btn);
 });
}

/* ===== 神経衰弱 ===== */
function startMemory(){

 document.getElementById("question").innerText="神経衰弱";

 let set=memorySets[Math.floor(Math.random()*memorySets.length)];
 let cards=[...set,...set].sort(()=>Math.random()-0.5);

 let open=[];
 let matched=0;
 let lock=false;

 let area=document.getElementById("answers");
 area.className="memory";

 cards.forEach(card=>{
   let div=document.createElement("div");
   div.className="card";
   div.innerText="?";

   div.onclick=()=>{

     if(lock) return;
     if(div.innerText!=="?") return;

     div.innerText=card;
     open.push({div,card});

     if(open.length===2){

       lock=true;

       let [a,b]=open;

       if(a.card===b.card){

         a.div.classList.add("matched");
         b.div.classList.add("matched");

         matched+=2;
         open=[];
         lock=false;

         if(matched===8){
           score++;
           setTimeout(next,800);
         }

       }else{

         setTimeout(()=>{
           a.div.innerText="?";
           b.div.innerText="?";
           open=[];
           lock=false;
         },700);

       }
     }
   };

   area.appendChild(div);
 });
}

next();
</script>

</body>
</html>
