<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  max-width: 520px;
  margin: auto;
}

/* 上バー */
.top-bar {
  display: flex;
  align-items: center;
  padding: 12px;
}

.back-btn {
  border: none;
  background: white;
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* カード */
.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.05);
}

.title {
  font-size: 16px;
  margin-bottom: 10px;
  color: #555;
}

/* チェック */
.option {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

/* スライダー */
input[type="range"] {
  width: 100%;
}
</style>
</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
</div>

<!-- 問題の種類 -->
<div class="card">
  <div class="title">問題の種類</div>

  <div class="option">
    <span>計算</span>
    <input type="checkbox" id="math">
  </div>

  <div class="option">
    <span>記憶</span>
    <input type="checkbox" id="memory">
  </div>

  <div class="option">
    <span>判断</span>
    <input type="checkbox" id="logic">
  </div>
</div>

<!-- 問題数 -->
<div class="card">
  <div class="title">問題数：<span id="countLabel">5</span>問</div>

  <input type="range" min="3" max="10" value="5" id="count">
</div>

<!-- 下部 -->
<div class="card" style="font-size:12px; color:#666;">
  このアプリは個人情報を収集しません。
</div>

<script>
// 初期読み込み
window.onload = () => {
  document.getElementById("countLabel").innerText =
    localStorage.getItem("count") || 5;

  document.getElementById("count").value =
    localStorage.getItem("count") || 5;

  document.getElementById("math").checked =
    localStorage.getItem("math") !== "false";

  document.getElementById("memory").checked =
    localStorage.getItem("memory") !== "false";

  document.getElementById("logic").checked =
    localStorage.getItem("logic") !== "false";
};

// 保存
document.getElementById("count").oninput = function() {
  document.getElementById("countLabel").innerText = this.value;
  localStorage.setItem("count", this.value);
};

["math","memory","logic"].forEach(id => {
  document.getElementById(id).onchange = function(){
    localStorage.setItem(id, this.checked);
  }
});
</script>

</body>
</html>
