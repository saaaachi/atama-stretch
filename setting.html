<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>設定</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 max-width:520px;
 margin:auto;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
}

.back{font-size:20px;}
.header-title{font-weight:bold;}

.card{
 background:white;
 margin:15px;
 padding:15px;
 border-radius:16px;
 box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.title{
 font-weight:bold;
 margin-bottom:10px;
}

.toggle{
 display:flex;
 justify-content:space-between;
 margin:10px 0;
}

input[type="checkbox"]{
 transform:scale(1.3);
}

select{
 width:100%;
 padding:10px;
 border-radius:10px;
 border:none;
 background:#f1f2f6;
}

.accordion-btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#dfe6e9;
 text-align:left;
}

.accordion-content{
 display:none;
 padding:10px;
 font-size:14px;
 color:#555;
}

textarea{
 width:100%;
 height:80px;
 border-radius:10px;
 border:none;
 padding:10px;
 background:#f1f2f6;
}

.send-btn{
 width:100%;
 margin-top:10px;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#74b9ff;
 color:white;
}
</style>
</head>

<body>

<div class="header">
 <div class="back" onclick="location.href='index.html'">←</div>
 <div class="header-title">設定</div>
</div>

<div class="card">
 <div class="title">問題設定</div>

 <div class="toggle">
  <span>計算問題</span>
  <input type="checkbox" id="useCalc">
 </div>

 <div class="toggle">
  <span>助詞問題</span>
  <input type="checkbox" id="useJosi">
 </div>

 <div class="toggle">
  <span>どっち問題</span>
  <input type="checkbox" id="useWhich">
 </div>

 <div class="toggle">
  <span>神経衰弱</span>
  <input type="checkbox" id="useMemory">
 </div>

 <div style="margin-top:10px;">
  <div>問題数</div>
  <select id="questionCount">
    <option value="3">3問</option>
    <option value="5">5問</option>
    <option value="7">7問</option>
    <option value="10">10問</option>
    <option value="15">15問</option>
  </select>
 </div>
</div>

<div class="card">
 <div class="title">ご意見・ご要望</div>
 <textarea id="msg"></textarea>
 <button class="send-btn" onclick="sendMsg()">送信</button>
</div>

<div class="card">
 <button class="accordion-btn" onclick="toggleAcc(this)">＋ 作成者からのメッセージ</button>
 <div class="accordion-content">
「あたまのストレッチ」をご利用いただき、ありがとうございます。<br><br>
このゲームは、脳卒中で倒れ失語症になった母のために作りました。<br><br>
ぜひ無理なく楽しんでください。
 </div>
</div>

<div class="card">
 <button class="accordion-btn" onclick="toggleAcc(this)">＋ プライバシーポリシー</button>
 <div class="accordion-content">
本アプリではGoogle AdSenseを利用しています。Cookieにより広告が表示される場合があります。
 </div>
</div>

<div class="card">
 <button class="accordion-btn" onclick="toggleAcc(this)">＋ 音源について</button>
 <div class="accordion-content">
BGM：変わらない日常（石屋 様）<br>
効果音：効果音ラボ
 </div>
</div>

<div class="card">
 <div class="title">他のゲーム</div>
 <a href="https://saaaachi.github.io/" target="_blank">👉 遊ぶ</a>
</div>

<script>
/* ===== 初期値（初回のみ全部ON） ===== */
function initDefault(){
 if(localStorage.getItem("initialized")) return;

 localStorage.setItem("useCalc", true);
 localStorage.setItem("useJosi", true);
 localStorage.setItem("useWhich", true);
 localStorage.setItem("useMemory", true);
 localStorage.setItem("questionCount", 5);

 localStorage.setItem("initialized", "true");
}
initDefault();

/* ===== 読み込み＆保存 ===== */
const ids=["useCalc","useJosi","useWhich","useMemory","questionCount"];

ids.forEach(id=>{
 let el=document.getElementById(id);

 let saved=localStorage.getItem(id);

 if(saved!==null){
   if(el.type==="checkbox") el.checked = saved==="true";
   else el.value = saved;
 }

 el.onchange=()=>{
   localStorage.setItem(id, el.type==="checkbox" ? el.checked : el.value);
 };
});

/* ===== アコーディオン ===== */
function toggleAcc(btn){
 let c=btn.nextElementSibling;
 c.style.display = c.style.display==="block"?"none":"block";
}

/* ===== メッセージ ===== */
function sendMsg(){
 let t=document.getElementById("msg").value;
 if(!t){alert("入力してください");return;}
 alert("送信ありがとうございました！");
 document.getElementById("msg").value="";
}
</script>

</body>
</html>
