<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"ー>
  <title>あたまのストレッチ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* 上バー */
.top-bar {
  display: flex;
  align-items: center;
  padding: 2vh;
}

.back-space {
  width: 10vw;
}

.setting-btn {
  font-size: 6vw;
}

/* 中央 */
.center {
  text-align: center;
  margin-top: 20vh;
}

.start-btn {
  font-size: 6vw;
  padding: 4vh 8vw;
  border-radius: 5vw;
}

/* 右下 */
.bottom-right {
  position: fixed;
  right: 5vw;
  bottom: 5vh;
}

.small-btn {
  margin-top: 2vh;
  padding: 3vh;
  font-size: 4vw;
  border-radius: 50%;

  max-width: 500px;
margin: auto;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="back-space"></div>
  <button class="setting-btn">⚙️</button>
</div>

<div class="center">
  <button class="start-btn" onclick="startGame()">
    今日の問題
  </button>
</div>

<div class="bottom-right">
  <button class="small-btn" onclick="location.href='result.html'">実績</button><br>
  <button class="small-btn" onclick="location.href='music.html'">音楽</button>
</div>

<!-- 準備画面 -->
<div id="loading" style="display:none; text-align:center; margin-top:100px;">
  <p>問題を準備しています…</p>
  <div><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
     crossorigin="anonymous"></script>
<!-- 頭問題準備中 -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1299640300068792"
     data-ad-slot="2165782928"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script></div>
</div>

<script>
function startGame() {
  const today = new Date().toDateString();
  const last = localStorage.getItem("lastAdDate");

  document.querySelector(".center").style.display = "none";
  document.getElementById("loading").style.display = "block";

  if (last !== today) {
    localStorage.setItem("lastAdDate", today);
    setTimeout(() => {
      location.href = "quiz.html";
    }, 1500);
  } else {
    location.href = "quiz.html";
  }
}
</script>

</body>
</html>
