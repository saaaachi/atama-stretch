<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
あたまのストレッチ｜失語症・高齢者向け脳トレ無料ゲーム【ブラウザで遊べる】
</title>

<meta name="description" content="
ダウンロード不要・ブラウザで無料で遊べる脳トレゲーム。
失語症・高齢者・高次脳機能障害のリハビリの補助として、
ご家庭で簡単に続けられます。
ガンマ波サウンドで集中力もサポート。
">

<link rel="icon" href="images/45264BEF-39F8-456E-92BE-7870C79D5AA2.png">
<link rel="apple-touch-icon" href="images/45264BEF-39F8-456E-92BE-7870C79D5AA2.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8f8f">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f2f4f7;
  max-width: 520px;
  margin: auto;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
}

.app-title{
  font-size:16px;
  font-weight:bold;
}

.setting-btn {
  font-size: 20px;
  border: none;
  background: #ffffff;
  border-radius: 12px;
  padding: 10px;
}

.main-card {
  background: white;
  margin: 20px;
  padding: 30px 20px;
  border-radius: 20px;
  text-align: center;
}

.title {
  font-size: 18px;
  color: #666;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
  line-height: 1.6;
}

.start-btn {
  width: 100%;
  font-size: 22px;
  padding: 18px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #ffb3b3, #ff8f8f);
  color: white;
}

.bottom-card {
  display: flex;
  justify-content: space-between;
  margin: 20px;
  gap: 10px;
}

.menu-btn {
  flex: 1;
  padding: 22px 0;
  border-radius: 16px;
  border: none;
  background: white;
  font-size:18px;
}

.result-btn { color: #4a90e2; }
.music-btn { color: #4caf50; }

.info-btn{
  margin-left:5px;
  border:none;
  background:#eee;
  border-radius:50%;
  width:22px;
  height:22px;
  font-size:12px;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:16px;
  width:85%;
  max-width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:none;
  z-index:999;
  font-size:14px;
  line-height:1.6;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:998;
}

.news-wrap {
  overflow: hidden;
  margin: 20px;
  background: white;
  border-radius: 16px;
  padding: 12px;
}

.news-text {
  white-space: nowrap;
  display: inline-block;
  animation: scrollText 12s linear infinite;
  font-size: 14px;
}

@keyframes scrollText {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

#loading {
  display: none;
  text-align: center;
  margin-top: 40vh;
}
</style>
</head>

<body>

<h1 style="display:none;">
無料の脳トレゲーム｜高齢者・失語症・高次脳機能障害のリハビリ対応・ブラウザで遊べる
</h1>

<div class="top-bar">
  <button class="setting-btn" onclick="location.href='setting.html'">⚙️</button>
  <div class="app-title">あたまのストレッチ</div>
</div>

<div class="main-card" id="mainUI">

  <div class="title">脳トレ・リハビリサポート</div>

  <div class="desc">
    毎日のすきま時間に、やさしく脳トレ。<br>
    ダウンロード不要で、すぐに始められます。
  </div>

  <button class="start-btn" onclick="startGame()">
    今日の問題をはじめる
  </button>

</div>

<div class="bottom-card">
  <button class="menu-btn result-btn" onclick="location.href='result.html'">実績</button>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <button class="menu-btn music-btn" onclick="location.href='music.html'">音楽</button>
    <button class="info-btn" onclick="openPopup()">？</button>
  </div>
</div>

<div class="news-wrap">
  <div class="news-text">
    🎉 ブラウザで無料プレイ可能！ダウンロード不要で今すぐ脳トレ✨
  </div>
</div>

<div id="loading">
  <p>問題を準備しています…</p>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <b>ガンマ波サウンドについて</b><br><br>
  集中したいときに使われるリズム音です。<br><br>
  朝や問題前におすすめ。<br>
  夜はオフでリラックスできます。<br><br>
  音楽ページ・問題ページで切替できます。
</div>

<script>
/* ===== アクセスログ（修正版） ===== */
const ref = document.referrer;
let logs = JSON.parse(localStorage.getItem("accessLog") || "[]");

if(ref){
  logs.push({
    date: new Date().toLocaleString(),
    ref: ref
  });
  localStorage.setItem("accessLog", JSON.stringify(logs));
}

/* 表示（デバッグ用） */
let logArea = document.createElement("div");
logArea.style.fontSize = "12px";
logArea.style.padding = "10px";
logArea.style.background = "#fff";
logArea.innerHTML = "<b>アクセスログ</b><br>" +
  logs.map(l => l.date + " / " + l.ref).join("<br>");

document.body.appendChild(logArea);

/* ===== ゲーム開始 ===== */
function startGame() {
  document.getElementById("mainUI").style.display = "none";
  document.querySelector(".bottom-card").style.display = "none";
  document.querySelector(".news-wrap").style.display = "none";
  document.getElementById("loading").style.display = "block";

  setTimeout(()=>{
    location.href="quiz.html";
  },1500);
}

/* ===== ポップ ===== */
function openPopup(){
  document.getElementById("popup").style.display="block";
  document.getElementById("overlay").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
