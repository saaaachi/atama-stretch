<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>あたまのストレッチ｜無料の脳トレ・高齢者・失語症リハビリサポート</title>

<meta name="description" content="無料で遊べる脳トレゲーム。高齢者・失語症・高次脳機能障害のリハビリの補助として、ご家庭で簡単に続けられます。集中をサポートする音機能も搭載。">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f2f4f7;
  max-width: 520px;
  margin: auto;
}

.top-bar {
  display: flex;
  align-items: center;
  padding: 12px;
}

.back-space { width: 40px; }

.setting-btn {
  font-size: 20px;
  border: none;
  background: #ffffff;
  border-radius: 12px;
  padding: 10px;
}

.main-card {
  background: white;
  margin: 20px;
  padding: 30px 20px;
  border-radius: 20px;
  text-align: center;
}

.title {
  font-size: 18px;
  color: #666;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
  line-height: 1.6;
}

/* ⭐ガンマ説明 */
.gamma-box{
  font-size:13px;
  color:#777;
  background:#f1f2f6;
  padding:10px;
  border-radius:12px;
  margin-bottom:20px;
  line-height:1.5;
}

.start-btn {
  width: 100%;
  font-size: 22px;
  padding: 18px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #ffb3b3, #ff8f8f);
  color: white;
}

.bottom-card {
  display: flex;
  justify-content: space-between;
  margin: 20px;
  gap: 10px;
}

.menu-btn {
  flex: 1;
  padding: 20px 0;
  border-radius: 16px;
  border: none;
  background: white;
}

.result-btn { color: #4a90e2; }
.music-btn { color: #4caf50; }

#loading {
  display: none;
  text-align: center;
  margin-top: 40vh;
}

.news-wrap {
  overflow: hidden;
  margin: 20px;
  background: white;
  border-radius: 16px;
  padding: 12px;
}

.news-text {
  white-space: nowrap;
  display: inline-block;
  animation: scrollText 12s linear infinite;
  font-size: 14px;
}

@keyframes scrollText {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<h1 style="display:none;">
無料の脳トレゲーム｜高齢者・失語症・高次脳機能障害のリハビリサポート
</h1>

<div class="top-bar">
  <div class="back-space"></div>
  <button class="setting-btn" onclick="location.href='setting.html'">⚙️</button>
</div>

<div class="main-card" id="mainUI">

  <div class="title">脳トレ・リハビリサポート</div>

  <div class="desc">
    高齢者の脳トレや、失語症・高次脳機能障害のリハビリの補助として、
    ご家庭で簡単にできるように作りました。
  </div>

  <!-- ⭐ガンマ派説明 -->
  <div class="gamma-box">
    ガンマ派サウンドは、一定のリズムで流れる音です。<br>
    集中したいときや脳トレの補助としてご利用いただけます。<br>
    音楽ページや問題ページでもオン・オフが可能です。
  </div>

  <button class="start-btn" onclick="startGame()">
    今日の問題をはじめる
  </button>

</div>

<div class="bottom-card">
  <button class="menu-btn result-btn" onclick="location.href='result.html'">実績</button>
  <button class="menu-btn music-btn" onclick="location.href='music.html'">音楽</button>
</div>

<div class="news-wrap">
  <div class="news-text">
    🎉 実績機能＆音楽機能追加！毎日続けやすくなりました✨
  </div>
</div>

<div id="loading">
  <p>問題を準備しています…</p>
</div>

<script>
function startGame() {
  document.getElementById("mainUI").style.display = "none";
  document.querySelector(".bottom-card").style.display = "none";
  document.querySelector(".news-wrap").style.display = "none";
  document.getElementById("loading").style.display = "block";

  setTimeout(()=>{
    location.href="quiz.html";
  },1500);
}
</script>

</body>
</html>
