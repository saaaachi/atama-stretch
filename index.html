<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あたまのストレッチ</title>

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxx"
    crossorigin="anonymous"></script>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    #loading-screen {
      margin-top: 50px;
    }

    #ad-area {
      margin-top: 20px;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<!-- 準備画面 -->
<div id="loading-screen">
  <p>問題を準備しています…</p>
  <p>しばらくお待ちください</p>

  <div id="ad-area">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-xxxxxxxx"
         data-ad-slot="xxxxxxxx"
         data-ad-format="rectangle"></ins>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" style="display:none;">
  <h2>ゲーム画面</h2>

  <!-- BGMボタン -->
  <button onclick="toggleBGM()">🔊 音楽ON / OFF</button>
</div>
<audio id="bgm" loop>
  <source src="audio/bgm.mp3" type="audio/mpeg">
</audio>
<script>

const today = new Date().toLocaleDateString();
const lastSeen = localStorage.getItem("lastAdDate");

window.onload = function(){

  if(lastSeen !== today){
    showLoadingWithAd();
    localStorage.setItem("lastAdDate", today);
  } else {
    startGame();
  }

}

// 準備画面（広告）
function showLoadingWithAd(){

  try {
    (adsbygoogle = window.adsbygoogle || []).push({});
  } catch(e) {}

  setTimeout(() => {
    startGame();
  }, 1500);
}

// ゲーム開始
function startGame(){
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
}

// 🎵 BGM制御
let isPlaying = false;

function toggleBGM(){
  const bgm = document.getElementById("bgm");

  if(!isPlaying){
    bgm.play();
    isPlaying = true;
  } else {
    bgm.pause();
    isPlaying = false;
  }
}

</script>
</body>
</html>
