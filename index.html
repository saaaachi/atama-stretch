<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あたまのストレッチ</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  
  background: #f2f4f7;

  max-width: 520px;
  margin: auto;
}

/* 上バー */
.top-bar {
  display: flex;
  align-items: center;
  padding: 12px;
}

.back-space {
  width: 40px;
}

/* 設定ボタン */
.setting-btn {
  font-size: 20px;
  border: none;
  background: #ffffff;
  border-radius: 12px;
  padding: 10px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* メインカード */
.main-card {
  background: white;
  margin: 20px;
  padding: 30px 20px;
  border-radius: 20px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.06);

  text-align: center;
}

/* タイトル */
.title {
  font-size: 18px;
  color: #666;
  margin-bottom: 20px;
}

/* 今日の問題ボタン */
.start-btn {
  width: 100%;
  font-size: 22px;
  padding: 18px;
  border-radius: 16px;
  border: none;

  background: linear-gradient(135deg, #ffb3b3, #ff8f8f);
  color: white;

  box-shadow: 0 4px 10px rgba(255, 120, 120, 0.3);
}

/* 下カード */
.bottom-card {
  display: flex;
  justify-content: space-between;
  margin: 20px;
  gap: 10px;
}

.menu-btn {
  flex: 1;
  padding: 20px 0;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  background: white;

  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* 個別カラー */
.result-btn {
  color: #4a90e2;
}

.music-btn {
  color: #4caf50;
}

/* タップ感 */
button:active {
  transform: scale(0.97);
}

/* 準備画面 */
#loading {
  display: none;
  text-align: center;
  margin-top: 40vh;
}

.ad-box {
  margin-top: 20px;
  padding: 20px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="back-space"></div>
  <button class="setting-btn" onclick="location.href='settings.html'">⚙️</button>
</div>

<!-- メイン -->
<div class="main-card" id="mainUI">
  <div class="title">今日のトレーニング</div>

  <button class="start-btn" onclick="startGame()">
    今日の問題をはじめる
  </button>
</div>

<!-- 下メニュー -->
<div class="bottom-card">
  <button class="menu-btn result-btn" onclick="location.href='result.html'">
    実績
  </button>

  <button class="menu-btn music-btn" onclick="location.href='music.html'">
    音楽
  </button>
</div>

<!-- 準備画面 -->
<div id="loading">
  <p>問題を準備しています…</p>

  <div class="ad-box">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
     crossorigin="anonymous"></script>
<!-- 頭問題準備中 -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-1299640300068792"
     data-ad-slot="2165782928"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
  </div>
</div>

<script>
function startGame() {
  const today = new Date().toDateString();
  const last = localStorage.getItem("lastAdDate");

  document.getElementById("mainUI").style.display = "none";
  document.querySelector(".bottom-card").style.display = "none";
  document.getElementById("loading").style.display = "block";

  if (last !== today) {
    localStorage.setItem("lastAdDate", today);

    setTimeout(() => {
      location.href = "quiz.html";
    }, 1500);

  } else {
    location.href = "quiz.html";
  }
}
</script>

</body>
</html>
