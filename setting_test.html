<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>設定（テスト）</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f6fa;
 max-width:520px;
 margin:auto;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
}

.back{font-size:20px;}
.header-title{font-weight:bold;}

.card{
 background:white;
 margin:15px;
 padding:15px;
 border-radius:16px;
 box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.title{
 font-weight:bold;
 margin-bottom:10px;
}

.toggle{
 display:flex;
 justify-content:space-between;
 margin:10px 0;
}

/* ⭐レベルUI */
.level-group{
 display:flex;
 justify-content:space-between;
 margin-top:10px;
 font-size:14px;
}

.level-group label{
 display:flex;
 align-items:center;
 gap:5px;
}
</style>
</head>

<body>

<div class="header">
 <div class="back" onclick="location.href='index.html'">←</div>
 <div class="header-title">設定（テスト）</div>
</div>

<div class="card">
 <div class="title">計算問題レベル</div>

 <div class="level-group">
  <label><input type="radio" name="calcLevel" value="off">なし</label>
  <label><input type="radio" name="calcLevel" value="easy">初級</label>
  <label><input type="radio" name="calcLevel" value="normal">中級</label>
  <label><input type="radio" name="calcLevel" value="hard">上級</label>
 </div>
</div>

<script>
const radios = document.querySelectorAll('input[name="calcLevel"]');

// 初期値（なければ初級）
let saved = localStorage.getItem("calcLevel") || "easy";

radios.forEach(r=>{
 if(r.value === saved){
   r.checked = true;
 }

 r.onchange = ()=>{
   localStorage.setItem("calcLevel", r.value);
 };
});
</script>

</body>
</html>
