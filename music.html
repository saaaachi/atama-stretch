<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6fa;
  overflow: hidden; /* スクロール禁止 */
}

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
}

.back-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: white;
  font-size: 22px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-right: 10px;
}

/* 全体レイアウト */
.container {
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
}

/* 広告 */
#ad-area {
  height: 100px;
}

/* アニメーション */
.visual {
  height: 80px;
}

.bar {
  display: inline-block;
  width: 8px;
  margin: 0 2px;
  background: #6fa8dc;
  height: 20px;
}

/* 音楽ボタン */
.music-btn {
  width: 85%;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #e0f0ff;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

/* 枠 */
.box {
  width: 85%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  text-align: center;
}

/* タイマー */
.timer-btn {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: #d4f5d4;
}

#countdown {
  margin-top: 5px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- ヘッダー -->
<div class="header">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <div class="title">音楽</div>
</div>

<div class="container">

  <!-- 広告 -->
  <div id="ad-area">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="3000015733"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- アニメーション -->
  <div class="visual" id="visual"></div>

  <!-- 音楽ボタン -->
  <button class="music-btn" onclick="playMusic('seseragi.mp3')">せせらぎ</button>
  <button class="music-btn" onclick="playMusic('kotori.mp3')">小鳥</button>
  <button class="music-btn" onclick="playMusic('debussy.mp3')">ピアノ</button>

  <!-- ガンマ -->
  <div class="box">
    <div>ガンマ波(40Hz)</div>
    <input type="checkbox" id="gammaToggle" onchange="toggleGamma()">
    <br><br>
    音量
    <br>
    <input type="range" min="0" max="1" step="0.1" value="0.5"
      onchange="setGammaVolume()">
  </div>

  <!-- タイマー -->
  <div class="box">
    <div>タイマー</div>
    <button class="timer-btn" onclick="startTimer(3)">3分</button>
    <button class="timer-btn" onclick="startTimer(5)">5分</button>
    <button class="timer-btn" onclick="startTimer(10)">10分</button>
    <button class="timer-btn" onclick="startTimer(20)">20分</button>
    <div id="countdown"></div>
  </div>

</div>

<script>
let currentAudio = new Audio();
let gammaAudio = new Audio("music/gamma.mp3");
gammaAudio.loop = true;

/* 音楽再生 */
function playMusic(file){
  currentAudio.pause();
  currentAudio = new Audio("music/" + file);
  currentAudio.loop = true;
  currentAudio.play();
  startAnimation();
}

/* ガンマ */
function toggleGamma(){
  if(document.getElementById("gammaToggle").checked){
    gammaAudio.play();
    startAnimation();
  } else {
    gammaAudio.pause();
    stopAnimationIfSilent();
  }
}

function setGammaVolume(){
  gammaAudio.volume = event.target.value;
}

/* アニメーション */
let animInterval;

function startAnimation(){
  if(animInterval) return;
  const visual = document.getElementById("visual");

  animInterval = setInterval(()=>{
    visual.innerHTML = "";
    for(let i=0;i<8;i++){
      let bar = document.createElement("div");
      bar.className = "bar";
      bar.style.height = (20 + Math.random()*60) + "px";
      visual.appendChild(bar);
    }
  },200);
}

function stopAnimationIfSilent(){
  if(!currentAudio.paused || !gammaAudio.paused) return;
  clearInterval(animInterval);
  animInterval = null;
  document.getElementById("visual").innerHTML = "";
}

/* タイマー */
let timer;

function startTimer(min){
  clearInterval(timer);
  let sec = min*60;

  timer = setInterval(()=>{
    sec--;
    document.getElementById("countdown").innerText =
      Math.floor(sec/60)+":"+("0"+sec%60).slice(-2);

    if(sec<=0){
      clearInterval(timer);
      currentAudio.pause();
      gammaAudio.pause();
      stopAnimationIfSilent();
      alert("終了しました");
    }
  },1000);
}
</script>

</body>
</html>
