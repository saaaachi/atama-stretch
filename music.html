<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f6f7fb;
  text-align: center;
}

/* ヘッダー /
.header {
  position: relative;
  padding: 10px;
}

.back {
  position: absolute;
  left: 10px;
  top: 10px;
  font-size: 20px;
  text-decoration: none;
}

/ タイトル /
h1 {
  margin: 10px 0 5px;
}

/ アニメーション /
.wave {
  margin: 15px auto;
  width: 80%;
  height: 50px;
  background: linear-gradient(90deg,#a0c4ff,#bdb2ff,#ffc6ff);
  background-size: 200% 100%;
  animation: move 2s infinite linear;
  border-radius: 10px;
}

@keyframes move {
  0% {background-position: 0%;}
  100% {background-position: 100%;}
}

/ ボタン /
.btn {
  display: block;
  width: 85%;
  max-width: 320px;
  margin: 12px auto;
  padding: 18px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
  background: #ffffff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.active {
  background: #d0ebff;
}

/ ガンマ /
.switch {
  margin: 15px;
  font-size: 16px;
}

/ スライダー /
.slider {
  width: 80%;
}

/ 説明 */
.desc {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <a href="index.html" class="back">←</a>
</div>

<h1>音楽</h1>

<div class="wave"></div>

<!-- 広告A -->
<div id="adA">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
 crossorigin="anonymous"></script>
<ins class="adsbygoogle"
 style="display:inline-block;width:320px;height:100px"
 data-ad-client="ca-pub-1299640300068792"
 data-ad-slot="3000015733"></ins>
</div>

<!-- 広告B -->
<div id="adB" style="display:none;">
<ins class="adsbygoogle"
 style="display:inline-block;width:320px;height:100px"
 data-ad-client="ca-pub-1299640300068792"
 data-ad-slot="9654526170"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<!-- 音ボタン -->
<button class="btn" onclick="playMusic('seseragi', this)">せせらぎ</button>
<button class="btn" onclick="playMusic('kotori', this)">小鳥</button>
<button class="btn" onclick="playMusic('debussy', this)">ピアノ</button>

<!-- ガンマ -->
<div class="switch">
  <label>
    ガンマ波（40Hz）ON/OFF
    <input type="checkbox" id="gammaSwitch">
  </label>
</div>

<!-- ガンマ音量 -->
<div>
  ガンマ音量<br>
  <input type="range" min="0" max="1" step="0.1" value="0.5"
    class="slider" onchange="changeGammaVolume(this.value)">
</div>

<!-- タイマー -->
<div style="margin-top:10px;">
  タイマー（分）<br>
  <select onchange="setTimer(this.value)">
    <option value="0">なし</option>
    <option value="5">5分</option>
    <option value="10">10分</option>
    <option value="15">15分</option>
  </select>
</div>

<div class="desc">
※音声が流れます。音量にご注意ください。
</div>

<!-- 音源 -->
<audio id="seseragi" src="music/seseragi.mp3" loop></audio>
<audio id="kotori" src="music/kotori.mp3" loop></audio>
<audio id="debussy" src="music/debussy.mp3" loop></audio>
<audio id="gamma" src="music/gamma.mp3" loop></audio>

<script>
let current = null;

// メイン音
function playMusic(name, btn){
  const audios = ["seseragi","kotori","debussy"];

  audios.forEach(id=>{
    document.getElementById(id).pause();
  });

  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));

  const audio = document.getElementById(name);

  if(current === audio){
    audio.pause();
    current = null;
    return;
  }

  audio.play();
  btn.classList.add("active");
  current = audio;
}

// ガンマ
const gamma = document.getElementById("gamma");
document.getElementById("gammaSwitch").addEventListener("change", (e)=>{
  if(e.target.checked){
    gamma.play();
  }else{
    gamma.pause();
  }
});

// ガンマ音量
function changeGammaVolume(v){
  gamma.volume = v;
}

// タイマー
let timer;
function setTimer(min){
  clearTimeout(timer);
  if(min > 0){
    timer = setTimeout(()=>{
      document.querySelectorAll("audio").forEach(a=>a.pause());
      alert("タイマー終了");
    }, min * 60000);
  }
}

// 広告切替（90秒）
let showA = true;
setInterval(()=>{
  document.getElementById("adA").style.display = showA ? "none" : "block";
  document.getElementById("adB").style.display = showA ? "block" : "none";
  showA = !showA;
}, 90000);

// スリープ防止
async function keepAwake(){
  try{
    await navigator.wakeLock.request('screen');
  }catch(e){}
}
keepAwake();
</script>

</body>
</html>
