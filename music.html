<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
  overflow:hidden;
}

/* ヘッダー */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
}

.back-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:22px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.title{
  font-size:22px;
  font-weight:bold;
}

/* レイアウト */
.container{
  height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  align-items:center;
}

/* 広告 */
#ad-area{
  height:100px;
}

/* ボタン */
.music-btn{
  width:85%;
  padding:14px;
  font-size:18px;
  border-radius:12px;
  border:none;
  background:#e0f0ff;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

/* 枠 */
.box{
  width:85%;
  padding:12px;
  border-radius:12px;
  background:white;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.timer-btn{
  margin:5px;
  padding:8px 12px;
  border-radius:10px;
  border:none;
  background:#d4f5d4;
}

#countdown{
  margin-top:5px;
}

/* 波紋 */
.wave{
  position:fixed;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  height:220px;
  pointer-events:none;
  z-index:999;
}

.wave::before,
.wave::after{
  content:"";
  position:absolute;
  border-radius:50%;
  border:3px solid rgba(100,150,255,0.4);
  width:100%;
  height:100%;
  animation:ripple 2.5s infinite ease-out;
}

.wave::after{
  animation-delay:1.2s;
}

@keyframes ripple{
  0%{transform:scale(0.5);opacity:0.7;}
  70%{transform:scale(1.8);opacity:0.2;}
  100%{transform:scale(2.2);opacity:0;}
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- ヘッダー -->
<div class="header">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <div class="title">音楽</div>
</div>

<div class="container">

  <!-- 広告 -->
  <div id="ad-area">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
    crossorigin="anonymous"></script>

    <ins class="adsbygoogle"
    style="display:inline-block;width:320px;height:100px"
    data-ad-client="ca-pub-1299640300068792"
    data-ad-slot="3000015733"></ins>

    <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- 音楽 -->
  <button class="music-btn" onclick="toggleMusic('seseragi.mp3')">せせらぎ</button>
  <button class="music-btn" onclick="toggleMusic('kotori.mp3')">小鳥</button>
  <button class="music-btn" onclick="toggleMusic('debussy.mp3')">ピアノ</button>

  <!-- ガンマ -->
  <div class="box">
    ガンマ波(40Hz)<br>
    <input type="checkbox" id="gammaToggle" onchange="toggleGamma()">
    <br><br>
    音量<br>
    <input type="range" min="0" max="1" step="0.1" value="0.5" id="gammaVol">
  </div>

  <!-- タイマー -->
  <div class="box">
    タイマー<br>
    <button class="timer-btn" onclick="startTimer(3)">3分</button>
    <button class="timer-btn" onclick="startTimer(5)">5分</button>
    <button class="timer-btn" onclick="startTimer(10)">10分</button>
    <button class="timer-btn" onclick="startTimer(20)">20分</button>
    <div id="countdown"></div>
  </div>

</div>

<!-- 波紋 -->
<div id="waveEffect" class="wave hidden"></div>

<script>
let currentAudio = null;
let currentFile = "";
let gammaAudio = new Audio("music/gamma.mp3");
gammaAudio.loop = true;

const wave = document.getElementById("waveEffect");

/* 音楽 */
function toggleMusic(file){
  if(currentFile === file && currentAudio){
    currentAudio.pause();
    currentAudio = null;
    currentFile = "";
    stopWave();
    return;
  }

  if(currentAudio){
    currentAudio.pause();
  }

  currentAudio = new Audio("music/" + file);
  currentAudio.loop = true;
  currentAudio.play();
  currentFile = file;

  startWave();
}

/* ガンマ */
document.getElementById("gammaToggle").addEventListener("change", e=>{
  if(e.target.checked){
    gammaAudio.play();
    startWave();
  }else{
    gammaAudio.pause();
    checkStopWave();
  }
});

document.getElementById("gammaVol").addEventListener("input", e=>{
  gammaAudio.volume = e.target.value;
});

/* 波紋 */
function startWave(){
  wave.classList.remove("hidden");
}

function stopWave(){
  if(!gammaAudio.paused) return;
  wave.classList.add("hidden");
}

function checkStopWave(){
  if(!currentAudio && gammaAudio.paused){
    wave.classList.add("hidden");
  }
}

/* タイマー */
let timer;

function startTimer(min){
  clearInterval(timer);
  let sec = min*60;

  timer = setInterval(()=>{
    sec--;

    document.getElementById("countdown").innerText =
      Math.floor(sec/60)+":"+("0"+sec%60).slice(-2);

    if(sec<=0){
      clearInterval(timer);

      if(currentAudio) currentAudio.pause();
      gammaAudio.pause();

      currentAudio=null;
      currentFile="";

      wave.classList.add("hidden");

      alert("終了しました");
    }
  },1000);
}
</script>

</body>
</html>
