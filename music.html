<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6fa;
  text-align: center;
}

/* 戻るボタン */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: none;
  background: white;
  font-size: 24px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* タイトル */
h1 {
  margin-top: 70px;
  font-size: 32px;
}

/* 音楽ボタン */
.music-btn {
  display: block;
  width: 80%;
  margin: 12px auto;
  padding: 20px;
  font-size: 20px;
  border-radius: 15px;
  border: none;
  background: #e0f0ff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.music-btn:active {
  transform: scale(0.97);
}

/* ガンマ */
.gamma-area {
  margin-top: 20px;
}

/* スライダー */
.slider {
  width: 80%;
}

/* タイマー */
.timer-btn {
  margin: 8px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: #d4f5d4;
  font-size: 16px;
}

/* カウント表示 */
#countdown {
  margin-top: 10px;
  font-size: 18px;
  color: #333;
}

/* 広告 */
#ad-area {
  margin-top: 20px;
}

/* アニメーション */
.visual {
  margin-top: 20px;
  height: 100px;
}

.bar {
  display: inline-block;
  width: 10px;
  margin: 0 3px;
  background: #6fa8dc;
  animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.1s;}
.bar:nth-child(3){animation-delay:0.2s;}
.bar:nth-child(4){animation-delay:0.3s;}
.bar:nth-child(5){animation-delay:0.4s;}

@keyframes bounce {
  0%,100% { height:20px; }
  50% { height:80px; }
}
</style>
</head>

<body>

<button class="back-btn" onclick="location.href='index.html'">←</button>

<h1>音楽</h1>

<!-- 音楽ボタン -->
<button class="music-btn" onclick="playMusic('seseragi.mp3')">せせらぎ</button>
<button class="music-btn" onclick="playMusic('kotori.mp3')">小鳥</button>
<button class="music-btn" onclick="playMusic('debussy.mp3')">ピアノ</button>

<!-- ガンマ波 -->
<div class="gamma-area">
  <label>
    ガンマ波(40Hz)
    <input type="checkbox" id="gammaToggle" onchange="toggleGamma()">
  </label>
  <br><br>
  ガンマ音量
  <br>
  <input type="range" min="0" max="1" step="0.1" value="0.5"
    class="slider" id="gammaVolume" onchange="setGammaVolume()">
</div>

<!-- タイマー -->
<div>
  <p>タイマー</p>
  <button class="timer-btn" onclick="startTimer(3)">3分</button>
  <button class="timer-btn" onclick="startTimer(5)">5分</button>
  <button class="timer-btn" onclick="startTimer(10)">10分</button>
  <button class="timer-btn" onclick="startTimer(20)">20分</button>
  <div id="countdown"></div>
</div>

<p>※音が出ます</p>

<!-- 広告 -->
<div id="ad-area">
  <!-- 広告A -->
  <div id="ad1">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="3000015733"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- 広告B -->
  <div id="ad2" style="display:none;">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792"
crossorigin="anonymous"></script>
<ins class="adsbygoogle"
style="display:inline-block;width:320px;height:100px"
data-ad-client="ca-pub-1299640300068792"
data-ad-slot="9654526170"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
</div>

<!-- アニメーション -->
<div class="visual">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<script>
let currentAudio = new Audio();
let gammaAudio = new Audio("music/gamma.mp3");
gammaAudio.loop = true;

// 音楽再生
function playMusic(file){
  currentAudio.pause();
  currentAudio = new Audio("music/" + file);
  currentAudio.loop = true;
  currentAudio.play();
}

// ガンマ
function toggleGamma(){
  if(document.getElementById("gammaToggle").checked){
    gammaAudio.play();
  } else {
    gammaAudio.pause();
  }
}

function setGammaVolume(){
  gammaAudio.volume = document.getElementById("gammaVolume").value;
}

// タイマー
let timerInterval;
function startTimer(min){
  clearInterval(timerInterval);
  let sec = min * 60;

  timerInterval = setInterval(()=>{
    sec--;
    document.getElementById("countdown").innerText =
      "残り " + Math.floor(sec/60) + ":" + ("0"+sec%60).slice(-2);

    if(sec <= 0){
      clearInterval(timerInterval);
      currentAudio.pause();
      gammaAudio.pause();
      alert("終了しました");
    }
  },1000);
}

// 広告切替（2分）
setTimeout(()=>{
  document.getElementById("ad1").style.display="none";
  document.getElementById("ad2").style.display="block";
},120000);

</script>

</body>
</html>
