<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f7fb;
  text-align: center;
  margin: 0;
}

.back {
  position: absolute;
  left: 10px;
  top: 10px;
  font-size: 20px;
}

h1 {
  margin-top: 40px;
}

.button {
  width: 80%;
  max-width: 300px;
  margin: 15px auto;
  padding: 20px;
  border-radius: 20px;
  font-size: 18px;
  border: none;
  background: #e0e7ff;
}

.playing {
  background: #a5b4fc;
}

/* ガンマスイッチ */
.switch {
  margin: 25px auto;
}

label {
  font-size: 18px;
}
</style>
</head>

<body>

<button class="back" onclick="location.href='index.html'">←</button>

<h1>音楽</h1>

<!-- ガンマ波 -->
<div class="switch">
  <label>
    <input type="checkbox" id="gammaToggle"> ガンマ波を流す
  </label>
</div>

<!-- 他の音 -->
<button class="button" onclick="playMain('seseragi', this)">せせらぎ</button>
<button class="button" onclick="playMain('kotori', this)">小鳥</button>
<button class="button" onclick="playMain('debussy', this)">クラシック</button>

<!-- 音源 -->
<audio id="gamma" src="music/gamma.mp3" loop></audio>
<audio id="seseragi" src="music/seseragi.mp3" loop></audio>
<audio id="kotori" src="music/kotori.mp3" loop></audio>
<audio id="debussy" src="music/debussy.mp3" loop></audio>

<script>
let currentMain = null;

// メイン音（排他）
function playMain(id, btn) {
  const audio = document.getElementById(id);

  if (currentMain && currentMain !== audio) {
    currentMain.pause();
    document.querySelectorAll('.button').forEach(b => b.classList.remove('playing'));
  }

  if (audio.paused) {
    audio.play();
    btn.classList.add('playing');
    currentMain = audio;
  } else {
    audio.pause();
    btn.classList.remove('playing');
    currentMain = null;
  }
}

// ガンマ波（重ねOK）
const gamma = document.getElementById("gamma");
document.getElementById("gammaToggle").addEventListener("change", (e) => {
  if (e.target.checked) {
    gamma.play();
  } else {
    gamma.pause();
  }
});

// 音量調整（重要）
gamma.volume = 0.7;
document.getElementById("seseragi").volume = 0.4;
document.getElementById("kotori").volume = 0.4;
document.getElementById("debussy").volume = 0.4;
</script>

</body>
</html>
